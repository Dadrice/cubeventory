<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" fill="#3b82f6"/>
  <!-- Isometric cube -->
  <!-- Top face (light) -->
