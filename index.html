                                currentWeight: c.emptyWeight + internalWeight + item.weight + calculateExternalWeight(c)
                              } : c)
                            );
                            itemWasHandled = true;
                          }
                        }
                      }
                      // If neither slot nor internal grid — fall through to main grid fallback below
                    }
                  }
                }

                // Main grid fallback — only runs if nothing above claimed the drop
                if (!itemWasHandled && !draggedFromInternal && item && gridRef.current) {
                  if (distance >= 5) {
                    const mainGridRect = gridRef.current.getBoundingClientRect();
                    const shape = getScaledContainerShape(item);
                    const bounds = getShapeBounds(shape);
                    const { row: currentRow, col: currentCol, isOutOfBounds } = resolveDropPosition(
                      clientX, clientY, dragOffset, mainGridRect, subCellSize, bounds, GRID_SUB_ROWS, GRID_SUB_COLS
                    );
                    if (isOutOfBounds) {
                      setPlacedItems(prev => prev.map(i =>
                        i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                      ));
                    } else {
                      setPlacedItems(prev => prev.map(i =>
                        i.id === draggedItem ? { ...i, position: { row: currentRow, col: currentCol } } : i
                      ));
                    }
                  }
                }

                setDraggedItem(null);
                setDragStartPosition(null);
                setDragStartClient(null);
                setDraggedFromInternal(false);
                draggedFromInternalRef.current = false;
                draggedFromSlotRef.current = -1;
                draggedSlotItemRef.current = null;
              }
              setIsPanning(false);
            };

            const handleBackgroundPointerDown = (e) => {
                if (draggedItem || showDropConfirm) return;

                // Placement mode: tap grid to place item
                if (placementMode) {
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const rect = gridRef.current?.getBoundingClientRect();
                    if (rect) {
                        const col = Math.round((clientX - rect.left) / subCellSize);
                        const row = Math.round((clientY - rect.top) / subCellSize);
                        const item = placementMode.item;
                        const shape = getScaledContainerShape(item);
                        const bounds = getShapeBounds(shape);
                        const { row: clampedRow, col: clampedCol } = clampPosition(row, col, bounds, GRID_SUB_ROWS, GRID_SUB_COLS);
                        const placedItem = { ...item, position: { row: clampedRow, col: clampedCol } };
                        setPlacedItems(prev => [...prev, placedItem]);
                        if (placementMode.source === 'setAside') {
                            setSetAsideItems(prev => prev.filter(i => i.id !== placementMode.setAsideId));
                        }
                        setPlacementMode(null);
                    }
                    return;
                }

                const touches = e.touches ? e.touches.length : 0;

                if (touches === 2) {
                    e.preventDefault();
                    const clientX = e.touches[0].clientX;
                    const clientY = e.touches[0].clientY;
                    setIsPanning(true);
                    setPanStart({ x: clientX, y: clientY });
                    setScrollOffset({ x: gridContainerRef.current.scrollLeft, y: gridContainerRef.current.scrollTop });
                }

                if (!showDropConfirm) {
                    setSelectedItemId(null);
                }
            };

            const calculateItemTextDisplay = (item, subCellSize) => {
              const shape = getScaledContainerShape(item);
              const bounds = getShapeBounds(shape);
              const itemWidthSub = bounds.maxCol - bounds.minCol + 1;
              const itemHeightSub = bounds.maxRow - bounds.minRow + 1;
              const itemWidthPx = itemWidthSub * subCellSize;
              const itemHeightPx = itemHeightSub * subCellSize;

              const nameText = item.name;
              const quantityText = item.containerType === 'quantity' ? `${item.currentUnits}/${item.maxUnits}` : '';
              const texts = [nameText];
              if (quantityText) texts.push(quantityText);
              let displayLines = [...texts];

              // Calculate available space with padding
              const paddingPx = 4; // small guardband to avoid glyph clipping
              const availWidth = itemWidthPx - (paddingPx * 2);
              const availHeight = itemHeightPx - (paddingPx * 2);

              // Minimum readable size
              const minFontSize = 6;
              // Cap max font relative to a single full cell so letters never exceed a full cell
              const maxFontSize = Math.min(32, Math.max(8, Math.floor(cellSize - (paddingPx * 2))));

              // Very small items - use minimal text
              if (availWidth < 20 || availHeight < 20) {
                return {
                  fontSize: 0, // Don't show text
                  texts: [],
                  lines: [],
                  style: {},
                  positionHint: { type: 'center' }
                };
              }

              // Calculate text dimensions more conservatively
              const estimateTextWidth = (text, fontSize) => {
                // Less conservative estimate: ~0.5 * fontSize per character
                return text.length * fontSize * 0.5;
              };

              const estimateTextHeight = (fontSize, lineCount) => {
                // Slightly tighter line height estimate: 1.0 * fontSize
                return fontSize * 1.0 * lineCount;
              };

              // Normalize coords relative to bounds
              const coords = shape.map(s => s.split(',').map(Number)).map(([r, c]) => [r - bounds.minRow, c - bounds.minCol]);
              const height = bounds.maxRow - bounds.minRow + 1;
              const width = bounds.maxCol - bounds.minCol + 1;

              // Build occupancy grid
              const grid = Array.from({ length: height }, () => Array(width).fill(0));
              coords.forEach(([r, c]) => { if (r >= 0 && r < height && c >= 0 && c < width) grid[r][c] = 1; });

              // Find longest horizontal contiguous segment in any row
              let bestHoriz = { row: 0, start: 0, len: 0 };
              for (let r = 0; r < height; r++) {
                let runStart = null;
                for (let c = 0; c < width; c++) {
                  if (grid[r][c] === 1) {
                    if (runStart === null) runStart = c;
                  } else {
                    if (runStart !== null) {
                      const len = c - runStart;
                      if (len > bestHoriz.len) bestHoriz = { row: r, start: runStart, len };
                      runStart = null;
                    }
                  }
                }
                if (runStart !== null) {
                  const len = width - runStart;
                  if (len > bestHoriz.len) bestHoriz = { row: r, start: runStart, len };
                }
              }

              // Find longest vertical contiguous segment in any column
              let bestVert = { col: 0, start: 0, len: 0 };
              for (let c = 0; c < width; c++) {
                let runStart = null;
                for (let r = 0; r < height; r++) {
                  if (grid[r][c] === 1) {
                    if (runStart === null) runStart = r;
                  } else {
                    if (runStart !== null) {
                      const len = r - runStart;
                      if (len > bestVert.len) bestVert = { col: c, start: runStart, len };
                      runStart = null;
                    }
                  }
                }
                if (runStart !== null) {
                  const len = height - runStart;
                  if (len > bestVert.len) bestVert = { col: c, start: runStart, len };
                }
              }

              // Decide which longest segment to use (horizontal row or vertical column).
              // Use the single longest contiguous segment on either axis (allow len==1).
              let positionHint = { type: 'segment', orientation: 'horizontal', row: bestHoriz.row, start: bestHoriz.start, len: Math.max(1, bestHoriz.len) };
              if (bestVert.len > bestHoriz.len) {
                positionHint = { type: 'segment', orientation: 'vertical', col: bestVert.col, start: bestVert.start, len: Math.max(1, bestVert.len) };
              }

              // Find font size and orientation
              let fontSize = 0;
              let orientation = 'horizontal';

              // Helpers: compute max font for horizontal (wrap into multiple lines within availHeight)
              const longestLineLen = Math.max(...texts.map(t => t.length));

              const computeMaxFontHorizontal = (availW, availH, maxLines = 2, preferNameFirst = true) => {
                const charWidthFactor = 0.52; // tighter avg char width relative to font-size
                const lineHeightFactor = 1.12;
                const primary = nameText || '';
                const secondary = quantityText || '';

                for (let f = maxFontSize; f >= minFontSize; f--) {
                  const charsPerLine = Math.floor(availW / (charWidthFactor * Math.max(1, f)));
                  if (charsPerLine <= 0) continue;

                  // We will produce at most `maxLines` lines. Prefer showing name and then quantity.
                  const lines = [];

                  if (secondary) {
                    // Require primary to fit on one line (no hyphenation) so quantity can occupy second line.
                    if (primary.length <= charsPerLine && secondary.length <= charsPerLine) {
                      lines.push(primary);
                      lines.push(secondary);
                    } else {
                      // Try shrinking font (continue loop)
                      continue;
                    }
                  } else {
                    // No secondary - try to fit primary into 1 or 2 lines
                    if (primary.length <= charsPerLine) {
                      lines.push(primary);
                    } else {
                      // Try word-boundary splits first (multi-word names like "Coin Purse")
                      const words = primary.split(' ');
                      let splitFound = false;
                      if (words.length > 1) {
                        for (let i = 1; i < words.length; i++) {
                          const part1 = words.slice(0, i).join(' ');
                          const part2 = words.slice(i).join(' ');
                          if (part1.length <= charsPerLine && part2.length <= charsPerLine) {
                            lines.push(part1);
                            lines.push(part2);
                            splitFound = true;
                            break;
                          }
                        }
                      }
                      if (!splitFound) {
                        // Single word or no valid word-boundary split: attempt character hyphenation
                        const firstPartLen = Math.max(1, charsPerLine - 1);
                        const secondLen = primary.length - firstPartLen;
                        if (secondLen <= charsPerLine) {
                          lines.push(primary.slice(0, firstPartLen) + '-');
                          lines.push(primary.slice(firstPartLen));
                        } else {
                          continue;
                        }
                      }
                    }
                  }

                  // Check height
                  const totalHeight = lines.length * (f * lineHeightFactor);
                  if (totalHeight <= availH && lines.length <= maxLines) return { font: f, lines };
                }
                return { font: 0, lines: [] };
              };

              // Always confine text to a single contiguous segment on the chosen axis.
              if (positionHint.orientation === 'horizontal') {
                const segAvailW = positionHint.len * subCellSize - (paddingPx * 2);
                const segAvailH = cellSize - (paddingPx * 2); // only within a single full cell row
                const fontHObj = computeMaxFontHorizontal(segAvailW, segAvailH, 2);
                const fontH = fontHObj.font;
                const linesH = fontHObj.lines;

                // Vertical candidate using the longest vertical segment (text stays horizontal, no rotation)
                const segAvailWVert = cellSize - (paddingPx * 2);
                const segAvailHVert = (bestVert.len || 1) * subCellSize - (paddingPx * 2);
                const fontVObj = computeMaxFontHorizontal(segAvailWVert, segAvailHVert, 2);
                const fontV = fontVObj.font;
                const linesV = fontVObj.lines;

                if (fontH > 0 || fontV > 0) {
                  if (fontH >= fontV) {
                    fontSize = fontH;
                    orientation = 'horizontal';
                    positionHint = { type: 'segment', orientation: 'horizontal', row: bestHoriz.row, start: bestHoriz.start, len: Math.max(1, bestHoriz.len), render: 'segment' };
                    if (linesH && linesH.length) displayLines = linesH;
                  } else {
                    fontSize = fontV;
                    orientation = 'vertical';
                    positionHint = { type: 'segment', orientation: 'vertical', col: bestVert.col, start: bestVert.start, len: Math.max(1, bestVert.len), render: 'segment' };
                    if (linesV && linesV.length) displayLines = linesV;
                  }
                } else {
                  // Neither orientation can fit text within a single-segment constraint
                  return { fontSize: 0, texts: [], lines: [], style: {}, positionHint: { type: 'center' } };
                }
              } else {
                // positionHint.orientation === 'vertical' (we picked vertical as the longer segment)
                // Text stays horizontal within the column, no rotation
                const segAvailW = cellSize - (paddingPx * 2);
                const segAvailH = positionHint.len * subCellSize - (paddingPx * 2);
                const fontVObj = computeMaxFontHorizontal(segAvailW, segAvailH, 2);
                const fontV = fontVObj.font;
                const linesV = fontVObj.lines;

                const segAvailWHor = (bestHoriz.len || 1) * subCellSize - (paddingPx * 2);
                const segAvailHHor = cellSize - (paddingPx * 2);
                const fontHObj = computeMaxFontHorizontal(segAvailWHor, segAvailHHor, 2);
                const fontH = fontHObj.font;
                const linesH = fontHObj.lines;

                if (fontV > 0 || fontH > 0) {
                  if (fontH >= fontV) {
                    fontSize = fontH;
                    orientation = 'horizontal';

                    const parsed = JSON.parse(LZString.decompressFromEncodedURIComponent(text.trim()));
                    if (parsed.type === 'cubeventory_transfer' && Array.isArray(parsed.items)) {
                        setSetAsideItems(prev => [...prev, ...parsed.items.map(assignFreshIds)]);
                        setShowReceiveModal(false);
                        return true;
                    }
                } catch { /* fall through */ }
                return false;
            };

            // ── Session (WebRTC / PeerJS) ────────────────────────────────────────────────

            // Setter that keeps the sessionPeers ref in sync so PeerJS callbacks can read it
            const updateSessionPeers = (updater) => {
                setSessionPeers(prev => {
                    const next = typeof updater === 'function' ? updater(prev) : updater;
                    sessionPeersRef.current = next;
                    return next;
                });
            };

            const sendTo = (peerId, data) => {
                const conn = connMapRef.current.get(peerId);
                if (conn?.open) conn.send(data);
            };

            const broadcastSession = (data) => {
                connMapRef.current.forEach(conn => { if (conn.open) conn.send(data); });
            };

            // Handles all incoming data messages from any peer
            const handleSessionMsg = (msg, fromId) => {
                if (msg.type === 'hello') {
                    // Register or update the peer's display name
                    updateSessionPeers(prev =>
                        prev.some(p => p.id === fromId)
                            ? prev.map(p => p.id === fromId ? { ...p, name: msg.name } : p)
                            : [...prev, { id: fromId, name: msg.name }]
                    );
                    if (sessionRoleRef.current === 'host') {
                        // Reply with the current peer list — only include alive connections
                        const list = sessionPeersRef.current
                            .filter(p => p.id !== fromId && connMapRef.current.get(p.id)?.open)
                            .map(p => ({ id: p.id, name: p.name }));
                        sendTo(fromId, { type: 'welcome', hostName: charNameRef.current, list });
                        // Tell all existing peers about the newcomer
                        connMapRef.current.forEach((conn, id) => {
                            if (id !== fromId && conn.open)
                                conn.send({ type: 'peer_joined', id: fromId, name: msg.name });
                        });
                    }
                } else if (msg.type === 'welcome') {
                    // We're a guest: learn the host's name and connect directly to all existing peers
                    updateSessionPeers(prev => prev.map(p => p.id === fromId ? { ...p, name: msg.hostName } : p));
                    msg.list.forEach(p => openSessionConn(p.id, p.name));
                } else if (msg.type === 'peer_left') {
                    connMapRef.current.delete(msg.id);
                    updateSessionPeers(prev => prev.filter(p => p.id !== msg.id));
                } else if (msg.type === 'name_update') {
                    updateSessionPeers(prev => prev.map(p => p.id === fromId ? { ...p, name: msg.name } : p));
                } else if (msg.type === 'transfer') {
                    setSetAsideItems(prev => [...prev, ...msg.items.map(assignFreshIds)]);
                } else if (msg.type === 'ping') {
                    sendTo(fromId, { type: 'pong' });
                }
            };

            // Attaches close/error/data handlers to a DataConnection
            const wireConn = (conn) => {
                conn.on('data', msg => handleSessionMsg(msg, conn.peer));
                const guestReconnect = (code) => {
                    // Lightweight cleanup: resets peer state but keeps sessionRole/sessionCode
                    // in React state so the button stays teal and the room code stays visible.
                    if (peerRef.current) { try { peerRef.current.destroy(); } catch {} peerRef.current = null; }
                    connMapRef.current.clear();
                    sessionRoleRef.current = null;
                    updateSessionPeers([]);
                    setSessionStatus('reconnecting');
                    setTimeout(() => joinSession(code), 800);
                };
                conn.on('close', () => {
                    if (sessionRoleRef.current === 'host') broadcastSession({ type: 'peer_left', id: conn.peer });
                    connMapRef.current.delete(conn.peer);
                    updateSessionPeers(prev => prev.filter(p => p.id !== conn.peer));
                    if (sessionRoleRef.current === 'guest' && conn.peer === sessionCodeRef.current)
                        guestReconnect(sessionCodeRef.current);
                });
                conn.on('error', () => {
                    connMapRef.current.delete(conn.peer);
                    updateSessionPeers(prev => prev.filter(p => p.id !== conn.peer));
                    if (sessionRoleRef.current === 'guest' && conn.peer === sessionCodeRef.current)
                        guestReconnect(sessionCodeRef.current);
                });
            };

            // Initiates an outgoing connection to another peer (guest→guest mesh links)
            const openSessionConn = (peerId, knownName) => {
                if (!peerRef.current || connMapRef.current.has(peerId)) return;
                const conn = peerRef.current.connect(peerId, { reliable: true });
                connMapRef.current.set(peerId, conn);
                if (knownName) updateSessionPeers(prev =>
                    prev.some(p => p.id === peerId) ? prev : [...prev, { id: peerId, name: knownName }]
                );
                conn.on('open', () => conn.send({ type: 'hello', name: charNameRef.current }));
                wireConn(conn);
            };

            const leaveSession = () => {
                if (peerRef.current) { peerRef.current.destroy(); peerRef.current = null; }
                connMapRef.current.clear();
                sessionRoleRef.current = null;
                setSessionRole(null);
                setSessionCode('');
                updateSessionPeers([]);
                setSessionStatus('');
            };

            const createSession = () => {
                if (peerRef.current) return;
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                const code = Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
                setSessionStatus('connecting');
                const peer = new Peer(code, { debug: 0 });
                peerRef.current = peer;
                peer.on('open', () => {
                    sessionRoleRef.current = 'host';
                    setSessionRole('host');
                    setSessionCode(code);
                    setSessionStatus('');
                });
                peer.on('connection', conn => {
                    const existing = connMapRef.current.get(conn.peer);
                    if (existing?.open) return; // truly duplicate live connection
                    if (existing) { try { existing.close(); } catch {} } // replace dead/stale connection
                    connMapRef.current.set(conn.peer, conn);
                    updateSessionPeers(prev => {
                        const without = prev.filter(p => p.id !== conn.peer);
                        return [...without, { id: conn.peer, name: '…' }];
                    });
                    wireConn(conn);
                });
                peer.on('error', err => {
                    setSessionStatus(err.type === 'unavailable-id' ? 'code-taken' : 'error');
                    leaveSession();
                });
            };

            const joinSession = (code) => {
                if (peerRef.current) return;
                const trimmed = code.trim().toUpperCase();
                if (trimmed.length < 6) { setSessionStatus('bad-code'); return; }
                setSessionStatus('connecting');
                const peer = new Peer({ debug: 0 });
                peerRef.current = peer;
                // Accept incoming connections from other guests (mesh)
                peer.on('connection', inConn => {
                    if (connMapRef.current.has(inConn.peer)) return;
                    connMapRef.current.set(inConn.peer, inConn);
                    updateSessionPeers(prev => prev.some(p => p.id === inConn.peer) ? prev : [...prev, { id: inConn.peer, name: '…' }]);
                    inConn.on('open', () => inConn.send({ type: 'hello', name: charNameRef.current }));
                    wireConn(inConn);
                });
                peer.on('open', () => {
                    const conn = peer.connect(trimmed, { reliable: true });
                    connMapRef.current.set(trimmed, conn);
                    updateSessionPeers([{ id: trimmed, name: '…' }]);
                    conn.on('open', () => {
                        conn.send({ type: 'hello', name: charNameRef.current });
                        sessionRoleRef.current = 'guest';
                        setSessionRole('guest');
                        setSessionCode(trimmed);
                        setSessionStatus('');
                    });
                    wireConn(conn);
                });
                peer.on('error', err => {
                    setSessionStatus(err.type === 'peer-unavailable' ? 'not-found' : 'error');
                    leaveSession();
                });
            };

            const sendItemsViaSession = (peerId) => {
                sendTo(peerId, { type: 'transfer', items: transferQueue.map(q => q.item) });
                confirmTransfer();
            };

            // ── Session resilience effects ───────────────────────────────────────────────

            // Save guest room code to sessionStorage so a page reload can auto-rejoin
            useEffect(() => {
                if (sessionRole === 'guest' && sessionCode) {
                    sessionStorage.setItem('cubeventory_rejoin', sessionCode);
                } else {
                    sessionStorage.removeItem('cubeventory_rejoin');
                }
            }, [sessionRole, sessionCode]);

            // On mount: if the page reloaded mid-session, rejoin automatically
            useEffect(() => {
                const code = sessionStorage.getItem('cubeventory_rejoin');
                if (code) {
                    sessionStorage.removeItem('cubeventory_rejoin');
                    setSessionStatus('reconnecting');
                    setTimeout(() => joinSession(code), 600);
                }
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            // Host: ping all guests every 10 s and prune any with dead connections
            useEffect(() => {
                if (sessionRole !== 'host') return;
                const id = setInterval(() => {
                    broadcastSession({ type: 'ping' });
                    sessionPeersRef.current.forEach(p => {
                        const conn = connMapRef.current.get(p.id);
                        const state = conn?.peerConnection?.connectionState;
                        if (!conn?.open || state === 'failed' || state === 'disconnected') {
                            try { conn?.close(); } catch {}
                            connMapRef.current.delete(p.id);
                            updateSessionPeers(prev => prev.filter(x => x.id !== p.id));
                        }
                    });
                }, 10000);
                return () => clearInterval(id);
            }, [sessionRole]);

            // Guest: when the tab becomes visible again, verify the host connection is still alive
            useEffect(() => {
                const onVisible = () => {
                    if (document.visibilityState !== 'visible') return;
                    if (sessionRoleRef.current !== 'guest') return;
                    const hostConn = connMapRef.current.get(sessionCodeRef.current);
                    if (!hostConn?.open) {
                        const code = sessionCodeRef.current;
                        if (!code) return;
                        if (peerRef.current) { try { peerRef.current.destroy(); } catch {} peerRef.current = null; }
                        connMapRef.current.clear();
                        sessionRoleRef.current = null;
                        updateSessionPeers([]);
                        setSessionStatus('reconnecting');
                        setTimeout(() => joinSession(code), 600);
                    }
                };
                document.addEventListener('visibilitychange', onVisible);
                return () => document.removeEventListener('visibilitychange', onVisible);
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            const { width: creationGridWidth, height: creationGridHeight } = getCreationGridSize();
            const selectedItem = placedItems.find(item => item.id === selectedItemId) ||
                (openContainerId ? placedItems.find(c => c.id === openContainerId)?.internalGrid.find(item => item.id === selectedItemId) : null);
            charNameRef.current    = characterName; // keep refs fresh for PeerJS callbacks
            sessionCodeRef.current = sessionCode;
            const subCellSize = cellSize / SUB_DIVISIONS;
            const creationSubCellSize = 40 * creationGridScale;
            const targetSubCells = calcTargetSubCells();

            if (showStartup) return (
                <div className="min-h-screen flex flex-col items-center justify-center gap-6 bg-gray-50 p-8 text-center">
                    <div>
                        <h1 className="text-3xl font-bold mb-2">Cubeventory</h1>
                        <p className="text-gray-500 text-sm">D&amp;D inventory manager</p>
                    </div>
                    <p className="text-gray-600 max-w-sm text-sm leading-relaxed">
                        Keep your save file in a consistent, easy-to-find location —
                        a dedicated folder on desktop, or your Google Drive / iCloud Drive root on mobile.
                    </p>
                    <div className="flex flex-col gap-3 w-full max-w-xs">
                        <button onClick={() => fileInputRef.current?.click()}
                            className="bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-600 text-sm">
                            Load Save File
                        </button>
                        <button onClick={startFresh}
                            className="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300 text-sm">
                            Start Fresh
                        </button>
                    </div>
                    <input ref={fileInputRef} type="file" accept=".json" onChange={importData} className="hidden" />
                </div>
            );

            return (
                <div className="flex flex-col h-screen bg-gray-50">
                    <div className="p-4 overflow-y-auto flex-1 pb-24">
                        <h1 className="text-2xl font-bold mb-3 text-center">Cubeventory Tracker</h1>

                        <div className="bg-white rounded-lg shadow mb-3">
                            {/* Collapsed summary bar — always visible */}
                            <button
                                className="w-full flex items-center justify-between px-3 py-2.5 text-left"
                                onClick={() => setControlsCollapsed(prev => !prev)}
                            >
                                <div className="flex items-center gap-3 min-w-0">
                                    <span className="font-semibold text-sm truncate">{characterName || 'Unnamed'}</span>
                                    <span className="text-xs text-gray-400 flex-shrink-0">Str {strength}</span>
                                </div>
                                <span className="text-gray-400 text-xs ml-2 flex-shrink-0">{controlsCollapsed ? '▼' : '▲'}</span>
                            </button>
                            {!controlsCollapsed && (
                                <div className="px-3 pb-3 border-t border-gray-100 pt-3 flex flex-col gap-2">
                                    {/* Character selector */}
                                    <div className="flex gap-2 items-center">
                                        <span className="text-xs text-gray-500 font-medium flex-shrink-0">Switch:</span>
                                        <select
                                            value={activeCharacterId}
                                            onChange={(e) => switchCharacter(e.target.value)}
                                            className="flex-1 border rounded px-2 py-1 text-sm"
                                        >
                                            {characters.map(c => (
                                                <option key={c.id} value={c.id}>
                                                    {c.id === activeCharacterId ? (characterName || 'Unnamed') : (c.name || 'Unnamed')}
                                                </option>
                                            ))}
                                        </select>
                                        <button onClick={createNewCharacter} title="New character"
                                            className="flex items-center justify-center bg-green-500 text-white w-8 h-8 rounded hover:bg-green-600 flex-shrink-0">
                                            <Plus size={16} />
                                        </button>
                                        <button onClick={() => setDeleteConfirmStep(1)} title="Delete character"
                                            className="flex items-center justify-center bg-red-500 text-white w-8 h-8 rounded hover:bg-red-600 flex-shrink-0">
                                            <Trash2 size={16} />
                                        </button>
                                    </div>
                                    {/* Name + Strength */}
                                    <div className="flex gap-2">
                                        <div className="flex-1">
                                            <label className="block text-xs font-medium mb-1">Character Name</label>
                                            <input type="text" value={characterName} onChange={(e) => setCharacterName(e.target.value)} className="w-full border rounded px-2 py-1 text-sm" placeholder="Enter name" />
                                        </div>
                                        <div className="w-24">
                                            <label className="block text-xs font-medium mb-1">Strength</label>
                                            <input type="number" value={strength} onChange={(e) => setStrength(Math.max(1, Math.min(30, parseInt(e.target.value) || 1)))} className="w-full border rounded px-2 py-1 text-sm" min="1" max="30" />
                                        </div>
                                    </div>
                                    {/* Cell size */}
                                    <div>
                                        <label className="block text-xs font-medium mb-1">Cell Size: {cellSize}px</label>
                                        <input type="range" min="20" max="60" value={cellSize} onChange={(e) => setCellSize(parseInt(e.target.value))} className="w-full" />
                                    </div>
                                    {/* File management */}
                                    <div className="flex gap-2">
                                        <button onClick={exportData} className="flex items-center gap-1 bg-green-500 text-white px-3 py-2 rounded text-sm hover:bg-green-600">
                                            <Save size={16} /> Save File
                                        </button>
                                        <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-1 bg-blue-500 text-white px-3 py-2 rounded text-sm hover:bg-blue-600">
                                            <Upload size={16} /> Load File
                                        </button>
                                        <button onClick={() => setShowBackups(true)} className="flex items-center gap-1 bg-gray-500 text-white px-3 py-2 rounded text-sm hover:bg-gray-600">
                                            History
                                        </button>
                                        <button onClick={() => setShowSession(true)}
                                            className={`flex items-center gap-1.5 px-3 py-2 rounded text-sm font-medium ${
                                                sessionStatus === 'reconnecting' ? 'bg-amber-400 text-white' :
                                                sessionRole ? 'bg-teal-500 text-white hover:bg-teal-600' :
                                                'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>
                                            Session
                                            {sessionRole && sessionStatus !== 'reconnecting' && <span className="bg-white bg-opacity-30 text-current rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">{sessionPeers.length}</span>}
                                            {sessionStatus === 'reconnecting' && <span className="text-xs">↻</span>}
                                        </button>
                                        <input ref={fileInputRef} type="file" accept=".json" onChange={importData} className="hidden" />
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-white p-3 rounded-lg shadow mb-3">
                          {!isCreatingItem ? (
                            <button onClick={() => { setIsCreatingItem(true); setSelectedItemId(null); }} className="flex items-center gap-1 text-purple-600 text-sm font-medium hover:text-purple-800">
                              <Plus size={14} /> New Item
                            </button>
                          ) : (
                            <>
                              <div className="flex items-center justify-between mb-2">
                                <h2 className="text-sm font-bold text-gray-700">Create New Item</h2>
                                <button onClick={() => { setIsCreatingItem(false); resetItemCreation(); }} className="text-gray-400 hover:text-gray-600 text-xs">✕ Cancel</button>
                              </div>
                              <select value={newItemType} onChange={(e) => {
                                setNewItemType(e.target.value);
                                // Reset container-specific states when switching types to prevent stale data
                                if (e.target.value !== 'container') {
                                  setNewItemContainerSubtype('quantity');
                                  setNewItemBaseWeight('');
                                  setNewItemFilledWeight('');
                                  setNewItemMaxUnits('');
                                  setNewItemInternalCapacity('');
                                  setNewItemExternalSlots(2);
                                  setNewItemExternalSlotWeight('10');
                                }
                              }} className="w-full mb-2 p-2 border rounded">
                                {Object.keys(ITEM_TYPES).map(type => (
                                  <option key={type} value={type}>{ITEM_TYPES[type].name}</option>
                                ))}
                              </select>
                              <input value={newItemName} onChange={(e) => setNewItemName(e.target.value)} placeholder="Item Name" className="w-full mb-2 p-2 border rounded" />
                              {newItemType === 'potion' && (
                                <input type="color" value={newItemColor} onChange={(e) => setNewItemColor(e.target.value)} className="w-full mb-2 p-1 border rounded" />
                              )}
                              {newItemType === 'container' ? (
                                <div>
                                  <select value={newItemContainerSubtype} onChange={(e) => setNewItemContainerSubtype(e.target.value)} className="w-full mb-2 p-2 border rounded">
                                    <option value="quantity">Quantity Container (quiver, waterskin, etc.)</option>
                                    <option value="grid">Grid Container (backpack, chest, etc.)</option>
                                    <option value="coinpurse">Coin Purse</option>
                                  </select>
                                  <input value={newItemBaseWeight} onChange={(e) => setNewItemBaseWeight(e.target.value)} placeholder="Empty Weight (lbs)" type="number" step="0.25" className="w-full mb-2 p-2 border rounded" />
                                  {newItemContainerSubtype === 'grid' ? (
                                    <div>
                                      <input value={newItemInternalCapacity} onChange={(e) => setNewItemInternalCapacity(e.target.value)} placeholder="Internal Capacity (lbs)" type="number" step="0.25" className="w-full mb-2 p-2 border rounded" />
                                      <input value={newItemExternalSlots} onChange={(e) => setNewItemExternalSlots(e.target.value)} placeholder="Number of External Slots (max 4)" type="number" min="0" max="4" className="w-full mb-2 p-2 border rounded" />
                                      <input value={newItemExternalSlotWeight} onChange={(e) => setNewItemExternalSlotWeight(e.target.value)} placeholder="Max Weight per Slot (lbs)" type="number" step="0.25" className="w-full mb-2 p-2 border rounded" />
                                    </div>
                                  ) : newItemContainerSubtype === 'quantity' ? (
                                    <div>
                                      <input value={newItemFilledWeight} onChange={(e) => setNewItemFilledWeight(e.target.value)} placeholder="Filled Contents Weight (lbs)" type="number" step="0.25" className="w-full mb-2 p-2 border rounded" />
                                      <input value={newItemMaxUnits} onChange={(e) => setNewItemMaxUnits(e.target.value)} placeholder="Max Units" type="number" className="w-full mb-2 p-2 border rounded" />
                                      <select value={newItemScaleDirection} onChange={(e) => setNewItemScaleDirection(e.target.value)} className="w-full mb-2 p-2 border rounded">
                                        <option value="vertical">Scale Vertical</option>
                                        <option value="horizontal">Scale Horizontal</option>
                                      </select>
                                    </div>
                                  ) : (
                                    <div>
                                      <input value={newItemColumnCap} onChange={(e) => setNewItemColumnCap(e.target.value)} placeholder="Lbs of coins per column (default 6)" type="number" step="0.25" min="0.25" className="w-full mb-2 p-2 border rounded" />
                                      <input value={newItemMaxColumns} onChange={(e) => setNewItemMaxColumns(e.target.value)} placeholder="Max columns / pouches (default 5)" type="number" min="1" className="w-full mb-2 p-2 border rounded" />
                                    </div>
                                  ) /* coinpurse */}
                                </div>
                              ) : (
                                <input value={newItemWeight} onChange={(e) => setNewItemWeight(e.target.value)} placeholder="Weight (lbs)" type="number" step="0.25" className="w-full mb-2 p-2 border rounded" />
                              )}
                                  <div className="mb-2">
                                    <label className="block text-sm font-medium mb-1">Creation Grid Scale: {(creationGridScale * 100).toFixed(0)}%</label>
                                    <input type="range" min="0.3" max="1" step="0.05" value={creationGridScale} onChange={(e) => setCreationGridScale(parseFloat(e.target.value))} className="w-full" />
                                </div>
                                <p className="text-sm mb-2">Tap sub-cells to paint shape ({newItemShape.length}/{targetSubCells})</p>
                                <div ref={creationGridRef} className="mb-2 inline-block" style={{ touchAction: 'none' }}>
                                    {[...Array(creationGridHeight)].map((_, row) => (
                                        <div key={row} className="flex">
                                            {[...Array(creationGridWidth)].map((_, col) => {
                                                const cellKey = `${row},${col}`;
                                                const isSelected = newItemShape.includes(cellKey);

                                                // Determine which "full cell" this sub-cell belongs to (for checkerboard)
                                                const fullCellRow = Math.floor(row / SUB_DIVISIONS);
                                                const fullCellCol = Math.floor(col / SUB_DIVISIONS);
                                                const isCheckerboardGray = (fullCellRow + fullCellCol) % 2 === 1;

                                                // Determine if this sub-cell is on a full cell boundary
                                                const isTopBoundary = row % SUB_DIVISIONS === 0;
                                                const isLeftBoundary = col % SUB_DIVISIONS === 0;

                                                return (
                                                    <div
                                                        key={col}
                                                        data-row={row}
                                                        data-col={col}
                                                        onPointerDown={(e) => {
                                                            e.preventDefault();
                                                            e.currentTarget.setPointerCapture(e.pointerId);

                                                            if (creationGridCellMode) {
                                                                // Cell mode - paint entire cell block
                                                                const fullCellRow = Math.floor(row / SUB_DIVISIONS);
                                                                const fullCellCol = Math.floor(col / SUB_DIVISIONS);
                                                                const subCells = [];
                                                                for (let sr = 0; sr < SUB_DIVISIONS; sr++) {
                                                                    for (let sc = 0; sc < SUB_DIVISIONS; sc++) {
                                                                        subCells.push(`${fullCellRow * SUB_DIVISIONS + sr},${fullCellCol * SUB_DIVISIONS + sc}`);
                                                                    }
                                                                }
                                                                const wasSelected = subCells.some(cell => newItemShape.includes(cell));
                                                                modifyShapeCellBlock(fullCellRow, fullCellCol, wasSelected ? 'remove' : 'add');
                                                                setPaintMode(wasSelected ? 'remove' : 'add');
                                                                lastPaintedRef.current = { row: fullCellRow, col: fullCellCol };
                                                            } else {
                                                                // Sub-cell mode - paint individual sub-cell
                                                                const cellKey = `${row},${col}`;
                                                                const wasSelected = newItemShape.includes(cellKey);
                                                                modifyShapeCell(row, col, wasSelected ? 'remove' : 'add');
                                                                setPaintMode(wasSelected ? 'remove' : 'add');
                                                                lastPaintedRef.current = { row, col };
                                                            }
                                                            setIsPainting(true);
                                                        }}
                                                        className={`cursor-pointer ${isSelected ? 'bg-purple-500' : (isCheckerboardGray ? 'bg-gray-100' : 'bg-white')}`}
                                                        style={{
                                                            width: creationSubCellSize,
                                                            height: creationSubCellSize,
                                                            borderTop: isTopBoundary ? '2px solid #9CA3AF' : (creationGridCellMode ? 'none' : '1px solid #D1D5DB'),
                                                            borderLeft: isLeftBoundary ? '2px solid #9CA3AF' : (creationGridCellMode ? 'none' : '1px solid #D1D5DB'),
                                                            borderRight: col === creationGridWidth - 1 ? '2px solid #9CA3AF' : 'none',
                                                            borderBottom: row === creationGridHeight - 1 ? '2px solid #9CA3AF' : 'none',
                                                        }}
                                                    />
                                                );
                                            })}
                                        </div>
                                    ))}

                                                    const qEntry = isQueued ? transferQueue.find(q => q.gridItemId === item.id) : null;
                                                    return (
                                                        <div key={item.id} className="flex items-center gap-2 py-1.5 border-b last:border-0">
                                                            <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ backgroundColor: item.color }} />
                                                            <div className="flex-1 min-w-0">
                                                                <div className="text-sm font-medium truncate">{item.name}</div>
                                                                <div className="text-xs text-gray-400">{item.weight} lbs</div>
                                                            </div>
                                                            <button
                                                                onClick={() => isQueued ? removeFromQueue(qEntry.qid) : addGridItemToQueue(item)}
                                                                className={`px-3 py-1 rounded text-xs font-medium flex-shrink-0 ${isQueued ? 'bg-teal-500 text-white hover:bg-teal-600' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 border'}`}>
                                                                {isQueued ? '✓ Queued' : 'Queue'}
                                                            </button>
                                                        </div>
                                                    );
                                                })
                                            }
                                        </div>

                                        {/* Transfer queue review */}
                                        {transferQueue.length > 0 && (
                                            <div>
                                                <div className="flex items-center justify-between mb-2">
                                                    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Transfer Queue ({transferQueue.length})</p>
                                                    <button onClick={() => setTransferQueue([])} className="text-xs text-red-400 hover:text-red-600">Clear All</button>
                                                </div>
                                                {transferQueue.map(q => (
                                                    <div key={q.qid} className="flex items-center gap-2 py-1.5 border-b last:border-0">
                                                        <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ backgroundColor: q.item.color }} />
                                                        <div className="flex-1 min-w-0">
                                                            <div className="text-sm font-medium truncate">{q.item.name}</div>
                                                            <div className="text-xs text-gray-400">{q.source === 'library' ? 'Library copy' : 'From grid'} · {q.item.weight} lbs</div>
                                                        </div>
                                                        <button onClick={() => removeFromQueue(q.qid)} className="text-red-400 text-lg leading-none hover:text-red-600 flex-shrink-0 px-1">✕</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Footer */}
                                    <div className="border-t px-4 py-3 flex-shrink-0">
                                        {/* Session send — shown when in a session with peers and items queued */}
                                        {sessionRole && sessionPeers.length > 0 && transferQueue.length > 0 && (
                                            <div className="mb-4">
                                                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Send via Session</p>
                                                <div className="flex flex-col gap-1.5">
                                                    {sessionPeers.map(p => (
                                                        <button key={p.id} onClick={() => sendItemsViaSession(p.id)}
                                                            className="w-full flex items-center justify-between py-2 px-3 rounded-lg bg-teal-50 border border-teal-200 hover:bg-teal-100">
                                                            <span className="text-sm font-medium text-teal-800">{p.name || p.id}</span>
                                                            <span className="text-xs text-teal-600 font-semibold">Send →</span>
                                                        </button>
                                                    ))}
                                                </div>
                                                <div className="flex items-center gap-2 mt-3 mb-1">
                                                    <div className="flex-1 h-px bg-gray-200" />
                                                    <span className="text-xs text-gray-400">or use QR</span>
                                                    <div className="flex-1 h-px bg-gray-200" />
                                                </div>
                                            </div>
                                        )}
                                        {transferQueue.length > 0 ? (
                                            <>
                                                <div className="mb-3">
                                                    <div className="flex justify-between text-xs text-gray-500 mb-1">
                                                        <span>QR Budget</span>
                                                        <span className={budgetPct > 90 ? 'text-red-500 font-semibold' : ''}>{qrChars} / {QR_MAX_CHARS} chars ({budgetPct}%)</span>
                                                    </div>
                                                    <div className="w-full bg-gray-200 rounded-full h-1.5">
                                                        <div className={`h-1.5 rounded-full transition-all ${budgetPct > 90 ? 'bg-red-500' : budgetPct > 70 ? 'bg-yellow-400' : 'bg-teal-500'}`}
                                                            style={{ width: `${budgetPct}%` }} />
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => { setShowTransferPanel(false); setShowTransferQR(true); }}
                                                    disabled={qrChars > QR_MAX_CHARS}
                                                    className="w-full bg-teal-500 text-white py-3 rounded-lg font-semibold hover:bg-teal-600 disabled:bg-gray-300 disabled:text-gray-500 text-sm">
                                                    Generate QR Code
                                                </button>
                                            </>
                                        ) : (
                                            <p className="text-sm text-gray-400 text-center py-1">Queue items above to generate a transfer QR.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* QR Transfer modal */}
                    {showTransferQR && (() => {
                        const rawCode = LZString.compressToEncodedURIComponent(
                            JSON.stringify({ type: 'cubeventory_transfer', version: 1, items: transferQueue.map(q => q.item) })
                        );
                        const shareCode = async () => {
                            try { await navigator.clipboard.writeText(rawCode); } catch {
                                const el = document.createElement('textarea');
                                el.value = rawCode; document.body.appendChild(el); el.select();
                                document.execCommand('copy'); document.body.removeChild(el);
                            }
                            setCopiedCode(true);
                            clearTimeout(copiedCodeTimerRef.current);
                            copiedCodeTimerRef.current = setTimeout(() => setCopiedCode(false), 2000);
                        };
                        return (
                            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[2100]">
                                <div className="bg-white rounded-xl p-5 max-w-xs w-full mx-4 text-center">
                                    <h3 className="font-bold text-lg mb-1">Transfer QR Code</h3>
                                    <p className="text-sm text-gray-500 mb-2">Scan to receive, or use the code below as a fallback.</p>
                                    <div className="flex justify-center mb-2">
                                        <div ref={qrCodeRef} className="inline-block" />
                                    </div>
                                    <p className="text-xs text-gray-400 mb-3">{transferQueue.length} item{transferQueue.length !== 1 ? 's' : ''} · {qrBudgetBytes} / {QR_MAX_CHARS} chars</p>

                                    {/* Text code — fallback if QR scan isn't available */}
                                    <details className="text-left mb-4">
                                        <summary className="text-xs text-gray-400 cursor-pointer hover:text-gray-600 select-none">Can't scan? Use transfer code instead</summary>
                                        <div className="mt-2 flex gap-1.5 items-start">
                                            <textarea readOnly value={rawCode}
                                                className="flex-1 text-xs border rounded p-1.5 font-mono resize-none h-14 bg-gray-50"
                                                onClick={e => e.target.select()} />
                                            <button onClick={shareCode}
                                                className={`flex-shrink-0 px-3 py-1 rounded text-xs font-medium border transition-colors ${copiedCode ? 'bg-teal-500 text-white border-teal-500' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>
                                                {copiedCode ? 'Copied!' : 'Copy'}
                                            </button>
                                        </div>
                                        <p className="text-xs text-gray-400 mt-1">Receiver pastes this in the Receive Items box.</p>
                                    </details>

                                    <div className="flex gap-2">
                                        <button onClick={cancelTransfer} className="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-lg text-sm hover:bg-gray-50">
                                            Cancel
                                        </button>
                                        <button onClick={confirmTransfer} className="flex-1 bg-teal-500 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-teal-600">
                                            Yes — Received!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Receive Items modal */}
                    {showReceiveModal && (
                        <div className="fixed inset-0 bg-black z-[2100] flex flex-col">
                            <div className="flex items-center justify-between px-4 py-3 bg-gray-900 flex-shrink-0">
                                <h3 className="text-white font-bold text-lg">Receive Items</h3>
                                <button onClick={() => setShowReceiveModal(false)} className="text-white text-2xl leading-none opacity-80 hover:opacity-100">✕</button>
                            </div>

                            {/* Live camera view — active when getUserMedia succeeded (desktop / HTTPS) */}
                            {cameraStatus !== 'unavailable' && (
                                <div className="flex-1 relative overflow-hidden min-h-0">
                                    <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover" muted playsInline />
                                    <canvas ref={scanCanvasRef} className="hidden" />
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <div className="w-56 h-56 rounded-xl border-2 border-white opacity-60" />
                                    </div>
                                    {cameraStatus === 'loading' && (
                                        <div className="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50">
                                            <span className="text-white text-sm">Starting camera…</span>
                                        </div>
                                    )}
                                    {cameraStatus === 'active' && (
                                        <p className="absolute bottom-0 left-0 right-0 text-white text-center text-xs py-2 bg-black bg-opacity-50 pointer-events-none">
                                            Live scan — point at the QR code
                                        </p>
                                    )}
                                </div>
                            )}

                            {/* Bottom panel — paste fallback */}
                            <div className="bg-white px-4 pt-4 pb-5 flex-shrink-0">

                                {cameraStatus === 'unavailable' && (
                                    <p className="text-sm text-gray-500 mb-3 text-center">
                                        Camera unavailable — paste the transfer code below instead.
                                    </p>
                                )}

                                <div className="flex items-center gap-2 mb-3">
                                    <div className="flex-1 h-px bg-gray-200" />
                                    <span className="text-xs text-gray-400">or paste code</span>
                                    <div className="flex-1 h-px bg-gray-200" />
                                </div>

                                <textarea
                                    value={receiveTextInput}
                                    onChange={e => setReceiveTextInput(e.target.value)}
                                    placeholder="Paste transfer code here…"
                                    className="w-full border rounded p-2 text-xs font-mono resize-none h-14 mb-2"
                                />
                                <button
                                    onClick={() => { if (!receiveTransferCode(receiveTextInput)) alert('Invalid transfer code — check that you copied the full text.'); }}
                                    disabled={!receiveTextInput.trim()}
                                    className="w-full bg-gray-600 text-white py-2 rounded text-sm font-semibold hover:bg-gray-700 disabled:bg-gray-300 disabled:text-gray-500">
                                    Receive from Pasted Code
                                </button>

                            </div>
                        </div>
                    )}

                    {/* Render dragged item at document level (works for both main and internal grid) */}
                    {draggedItem && (() => {
                      let item, gridRect, sourceSubCellSize;

                      if (draggedFromInternalRef.current && openContainerId) {
                        // Item from internal grid
                        const container = placedItems.find(c => c.id === openContainerId);
                        item = container?.internalGrid.find(i => i.id === draggedItem);
                        gridRect = internalGridRef.current?.getBoundingClientRect();
                        sourceSubCellSize = subCellSize;
                      } else if (draggedFromSlotRef.current !== -1 && draggedSlotItemRef.current) {
                        // Item being dragged from an attachment slot
                        item = { ...draggedSlotItemRef.current, position: draggedSlotPosition };
                        gridRect = gridRef.current?.getBoundingClientRect();
                        sourceSubCellSize = subCellSize;
                      } else {
                        // Item from main grid
                        item = placedItems.find(i => i.id === draggedItem);
                        gridRect = gridRef.current?.getBoundingClientRect();
                        sourceSubCellSize = subCellSize;
                      }

                      if (!item || !gridRect) {
                        console.error('FAILED to render dragged item:', { item: !!item, gridRect: !!gridRect });
                        return null;
                      }

                      const shape = getScaledContainerShape(item);
                      const bounds = getShapeBounds(shape);
                      const selected = selectedItemId === item.id;

                      const itemWidth  = (bounds.maxCol - bounds.minCol + 1) * sourceSubCellSize;
                      const itemHeight = (bounds.maxRow - bounds.minRow + 1) * sourceSubCellSize;
                      const textDisplay = calculateItemTextDisplay(item, sourceSubCellSize);

                      return (
                        <div className="fixed top-0 left-0 pointer-events-none" style={{ zIndex: 9999 }}>
                          {selected && shape.map((cell, idx) => {
                            const [r, c] = cell.split(',').map(Number);
                            const absRow = item.position.row + r;
                            const absCol = item.position.col + c;
                            const borders = getSelectionBorders(shape, r, c);
                            return (
                              <div
                                key={`drag-highlight-${idx}`}
                                className={`absolute ${borders.join(' ')}`}
                                style={{
                                  width: sourceSubCellSize,
                                  height: sourceSubCellSize,
                                  top: gridRect.top + (absRow * sourceSubCellSize),
                                  left: gridRect.left + (absCol * sourceSubCellSize),
                                  boxShadow: '0 0 8px rgba(132, 204, 22, 0.8)',
                                }}
                              />
                            );
                          })}

                          {shape.map((cell, idx) => {
                            const [r, c] = cell.split(',').map(Number);
                            const absRow = item.position.row + r;
                            const absCol = item.position.col + c;
                            return (
                              <div
                                key={`drag-cell-${idx}`}
                                className="absolute"
                                style={{
                                  width: sourceSubCellSize,
                                  height: sourceSubCellSize,
                                  top: gridRect.top + (absRow * sourceSubCellSize),
                                  left: gridRect.left + (absCol * sourceSubCellSize),
                                  backgroundColor: item.color,
                                  opacity: 0.8
                                }}
                              />
                            );
                          })}

                          {renderTextOverlay(
                            textDisplay,
                            gridRect.top  + ((item.position.row + bounds.minRow) * sourceSubCellSize),
                            gridRect.left + ((item.position.col + bounds.minCol) * sourceSubCellSize),
                            itemWidth, itemHeight, sourceSubCellSize, cellSize
                          )}
                        </div>
                      );
                    })()}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<CubeventoryTracker />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/cubeventory/sw.js');
        }
    </script>
</body>
</html>
