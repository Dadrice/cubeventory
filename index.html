<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubeventory Tracker</title>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .writing-mode-vertical-lr {
            writing-mode: vertical-lr;
            text-orientation: upright;
        }

        /* Hide spinner arrows on coinpurse coin inputs */
        .coin-input::-webkit-outer-spin-button,
        .coin-input::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        .coin-input { -moz-appearance: textfield; appearance: textfield; }
    </style>
    <link rel="manifest" href="/cubeventory/manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Save = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const Upload = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const Plus = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Trash2 = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const FlipHorizontal = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><path d="M12 20v2"/><path d="M12 14v2"/><path d="M12 8v2"/><path d="M12 2v2"/></svg>;
        const ArrowDownToLine = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="3" x2="12" y2="15"/><polyline points="8 11 12 15 16 11"/><line x1="4" y1="20" x2="20" y2="20"/></svg>;

        // Returns the Tailwind border classes for a single sub-cell's selection outline.
        // A border edge is drawn only where the adjacent cell is NOT part of the shape.
        const getSelectionBorders = (shape, r, c) => {
            const neighbors = [
                { dr: -1, dc: 0, cls: 'border-t-4 border-lime-500' },
                { dr:  1, dc: 0, cls: 'border-b-4 border-lime-500' },
                { dr:  0, dc:-1, cls: 'border-l-4 border-lime-500' },
                { dr:  0, dc: 1, cls: 'border-r-4 border-lime-500' },
            ];
            return neighbors
                .filter(({ dr, dc }) => !shape.some(s => {
                    const [sr, sc] = s.split(',').map(Number);
                    return sr === r + dr && sc === c + dc;
                }))
                .map(n => n.cls);
        };

        // Renders the item name/quantity text overlay at pre-computed absolute pixel positions.
        // wrapTopPx / wrapLeftPx are in whatever coordinate space the containing element uses.
        const renderTextOverlay = (textDisplay, wrapTopPx, wrapLeftPx, itemWidth, itemHeight, subCellSz, cellSz, zIndex = 1) => {
            if (!textDisplay || textDisplay.fontSize === 0) return null;
            const innerCommon = { position: 'absolute', color: 'white', textShadow: '1px 1px 2px black' };
            const wrapStyle = { position: 'absolute', top: wrapTopPx, left: wrapLeftPx, width: itemWidth, height: itemHeight, zIndex, pointerEvents: 'none' };
            const displayLines = textDisplay.lines || textDisplay.texts;

            if (textDisplay.positionHint.type === 'segment') {
                if (textDisplay.positionHint.orientation === 'horizontal') {
                    const topOffset  = textDisplay.positionHint.row   * subCellSz;
                    const leftOffset = textDisplay.positionHint.start  * subCellSz;
                    const segWidth   = textDisplay.positionHint.len    * subCellSz;
                    const innerHeight = textDisplay.positionHint.render === 'bbox' ? itemHeight : cellSz;
                    const innerTop    = textDisplay.positionHint.render === 'bbox' ? 0 : topOffset;
                    return (
                        <div style={wrapStyle}>
                            <div style={{ ...innerCommon, position: 'absolute', top: innerTop, left: leftOffset, width: segWidth, height: innerHeight, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', ...textDisplay.style }}>
                                {displayLines.map((text, idx) => <div key={idx} style={{ width: '100%', textAlign: 'center', pointerEvents: 'none' }}>{text}</div>)}
                            </div>
                        </div>
                    );
                } else {
                    const leftOffset = textDisplay.positionHint.col   * subCellSz;
                    const topOffset  = textDisplay.positionHint.start * subCellSz;
                    const segHeight  = textDisplay.positionHint.len   * subCellSz;
                    return (
                        <div style={wrapStyle}>
                            <div style={{ ...innerCommon, position: 'absolute', top: topOffset, left: leftOffset, width: cellSz, height: segHeight, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', ...textDisplay.style }}>
                                {displayLines.map((text, idx) => <div key={idx} style={{ width: '100%', textAlign: 'center', pointerEvents: 'none' }}>{text}</div>)}
                            </div>
                        </div>
                    );
                }
            }
            // Center fallback
            return (
                <div style={{ ...wrapStyle, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ ...innerCommon, ...textDisplay.style }}>
                        {displayLines.map((text, idx) => <div key={idx} style={{ textAlign: 'center' }}>{text}</div>)}
                    </div>
                </div>
            );
        };

        const AUTOSAVE_KEY    = 'cubeventory_autosave';
        const BACKUPS_KEY     = 'cubeventory_backups';
        const MAX_BACKUPS     = 5;
        const SAVE_VERSION    = 2;
        const DEFAULT_CHAR_ID = 'char_default';
        const loadAutoSave = () => { try { return JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || 'null'); } catch { return null; } };
        const QR_MAX_CHARS = 2900; // QR v40 L-level EC byte limit (2953); L chosen over M for fewer modules = larger modules on screen

        function CubeventoryTracker() {
            const [characters, setCharacters] = useState(() => {
                const saved = loadAutoSave();
                if (saved?.characters?.length > 0) return saved.characters;
                return [{ id: DEFAULT_CHAR_ID, name: saved?.characterName || '', strength: saved?.strength || 10, placedItems: saved?.placedItems || [], setAsideItems: saved?.setAsideItems || [] }];
            });
            const [activeCharacterId, setActiveCharacterId] = useState(() => {
                const saved = loadAutoSave();
                if (saved?.activeCharacterId) return saved.activeCharacterId;
                if (saved?.characters?.length > 0) return saved.characters[0].id;
                return DEFAULT_CHAR_ID;
            });
            const [characterName, setCharacterName] = useState(() => {
                const saved = loadAutoSave();
                if (saved?.characters?.length > 0) {
                    const aid = saved.activeCharacterId || saved.characters[0].id;
                    const ac = saved.characters.find(c => c.id === aid) || saved.characters[0];
                    return ac.name || '';
                }
                return saved?.characterName || '';
            });
            const [strength, setStrength] = useState(() => {
                const saved = loadAutoSave();
                if (saved?.characters?.length > 0) {
                    const aid = saved.activeCharacterId || saved.characters[0].id;
                    const ac = saved.characters.find(c => c.id === aid) || saved.characters[0];
                    return ac.strength || 10;
                }
                return saved?.strength || 10;
            });
            const [cellSize,      setCellSize]      = useState(40);
            const [items,         setItems]         = useState(() => { const s = loadAutoSave(); return s?.libraryItems || s?.items || []; });
            const [placedItems,   setPlacedItems]   = useState(() => {
                const saved = loadAutoSave();
                if (saved?.characters?.length > 0) {
                    const aid = saved.activeCharacterId || saved.characters[0].id;
                    const ac = saved.characters.find(c => c.id === aid) || saved.characters[0];
                    return ac.placedItems || [];
                }
                return saved?.placedItems || [];
            });
            const [isCreatingItem, setIsCreatingItem] = useState(false);
            const [newItemName, setNewItemName] = useState('');
            const [newItemWeight, setNewItemWeight] = useState('');
            const [newItemBaseWeight, setNewItemBaseWeight] = useState('');
            const [newItemFilledWeight, setNewItemFilledWeight] = useState('');
            const [newItemMaxUnits, setNewItemMaxUnits] = useState('');
            const [newItemShape, setNewItemShape] = useState([]);
            const [newItemType, setNewItemType] = useState('weapon');
            const [newItemColor, setNewItemColor] = useState('#3B82F6');
            const [newItemScaleDirection, setNewItemScaleDirection] = useState('vertical');
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [dragStartPosition, setDragStartPosition] = useState(null);
            const [dragStartClient, setDragStartClient] = useState(null);
            const [isPanning, setIsPanning] = useState(false);
            const [panStart, setPanStart] = useState({ x: 0, y: 0 });
            const [scrollOffset, setScrollOffset] = useState({ x: 0, y: 0 });
            const [draggedSlotPosition, setDraggedSlotPosition] = useState({ row: 0, col: 0 }); // position for ghost rendering of slot-dragged items
            const [showDropConfirm, setShowDropConfirm] = useState(false);
            const [isPainting, setIsPainting] = useState(false);
            const [paintMode, setPaintMode] = useState(null); // 'add' or 'remove'
            const fileInputRef = useRef(null);
            const gridRef = useRef(null);
            const gridContainerRef = useRef(null);
            const creationGridRef = useRef(null);
            const internalGridRef = useRef(null);
            const attachmentSlotRefs = useRef([]);
            const lastPaintedRef    = useRef(null);
            const autoSaveTimerRef  = useRef(null);
            const deleteUndoTimerRef = useRef(null);
            const qrCodeRef      = useRef(null);
            const qrInstanceRef  = useRef(null);
            const videoRef       = useRef(null);
            const scanCanvasRef  = useRef(null);
            const scanAnimRef    = useRef(null);
            const scanStreamRef  = useRef(null);
            const detectorRef    = useRef(null);
            const copiedCodeTimerRef = useRef(null);
            const peerRef         = useRef(null);       // PeerJS Peer instance
            const connMapRef      = useRef(new Map());  // peerId → DataConnection
            const sessionRoleRef  = useRef(null);       // mirrors sessionRole for use in callbacks
            const sessionPeersRef = useRef([]);         // mirrors sessionPeers for use in callbacks
            const charNameRef     = useRef('');
            const sessionCodeRef  = useRef('');         // mirrors sessionCode for use in callbacks
            const isDraggingItem = draggedItem !== null;
            const [creationGridScale, setCreationGridScale] = useState(0.5);
            const creationGridCellMode = creationGridScale < 0.75; // true = cell mode, false = sub-cell mode, float is threshold percentage

            const [newItemContainerSubtype, setNewItemContainerSubtype] = useState('quantity'); // 'quantity'|'grid'|'coinpurse'
            const [newItemColumnCap, setNewItemColumnCap] = useState('');     // lbs of coins per column/pouch
            const [newItemMaxColumns, setNewItemMaxColumns] = useState('');   // max columns (width)
            const [newItemInternalCapacity, setNewItemInternalCapacity] = useState('');
            const [newItemExternalSlots, setNewItemExternalSlots] = useState(2);
            const [newItemExternalSlotWeight, setNewItemExternalSlotWeight] = useState('10');
            const [openContainerId, setOpenContainerId] = useState(null);
            const [openCoinpurseId, setOpenCoinpurseId] = useState(null);
            const [draggedFromInternal, setDraggedFromInternal] = useState(false); // Flag to track if drag started in internal grid
            const [setAsideItems, setSetAsideItems] = useState(() => {
                const saved = loadAutoSave();
                if (saved?.characters?.length > 0) {
                    const aid = saved.activeCharacterId || saved.characters[0].id;
                    const ac = saved.characters.find(c => c.id === aid) || saved.characters[0];
                    return ac.setAsideItems || [];
                }
                return saved?.setAsideItems || [];
            });
            const [showStartup,      setShowStartup]      = useState(() => !loadAutoSave());
            const [showBackups,      setShowBackups]      = useState(false);
            const [deleteConfirmStep, setDeleteConfirmStep] = useState(0); // 0=closed, 1=first confirm, 2=second confirm
            const [deletedChars,     setDeletedChars]     = useState([]);
            const [showDeleteUndo,   setShowDeleteUndo]   = useState(false);
            const [controlsCollapsed, setControlsCollapsed] = useState(true);
            const [coinDraft, setCoinDraft] = useState({});
            const [coinpurseView,  setCoinpurseView]  = useState('manage'); // 'manage' | 'convert'
            const [convertFrom,    setConvertFrom]    = useState(null);
            const [convertTo,      setConvertTo]      = useState(null);
            const [convertAmount,  setConvertAmount]  = useState('');
            const [transferQueue,      setTransferQueue]      = useState([]); // [{ qid, source:'grid'|'library', item, gridItemId? }]
            const [showTransferPanel,  setShowTransferPanel]  = useState(false);
            const [showTransferQR,     setShowTransferQR]     = useState(false);
            const [showReceiveModal,   setShowReceiveModal]   = useState(false);
            const [qrBudgetBytes,      setQrBudgetBytes]      = useState(0);
            const [sessionRole,      setSessionRole]      = useState(null);   // 'host'|'guest'|null
            const [sessionCode,      setSessionCode]      = useState('');
            const [sessionPeers,     setSessionPeers]     = useState([]);    // [{id, name}]
            const [showSession,      setShowSession]      = useState(false);
            const [sessionJoinInput, setSessionJoinInput] = useState('');
            const [sessionStatus,    setSessionStatus]    = useState('');    // ''|'connecting'|'error'|'not-found'|...
            const [cameraStatus,       setCameraStatus]       = useState('loading'); // 'loading'|'active'|'unavailable'
            const [receiveTextInput,   setReceiveTextInput]   = useState('');
            const [copiedCode,         setCopiedCode]         = useState(false);
            const [placementMode, setPlacementMode] = useState(null);
            const [libraryCollapsed, setLibraryCollapsed] = useState(true);
            const [librarySearch, setLibrarySearch] = useState('');
            const [librarySortKey, setLibrarySortKey] = useState('name-asc'); // 'name-asc'|'name-desc'|'weight-asc'|'weight-desc'
            const [libraryCategoryFilter, setLibraryCategoryFilter] = useState('all'); // 'all'|'armor'|'weapon'|'supply'|'container'|'potion'

            const [overlayPosition, setOverlayPosition] = useState(null);
            const [isDraggingOverlay, setIsDraggingOverlay] = useState(false);
            const [overlayDragStart, setOverlayDragStart] = useState({ x: 0, y: 0 });

            const dragOffsetRef = useRef({ x: 0, y: 0 });
            const draggedFromInternalRef = useRef(false);
            const draggedFromSlotRef = useRef(-1);       // slot index if drag started from an attachment slot, else -1
            const draggedSlotItemRef = useRef(null);     // the item data while being dragged from a slot


            const COLS = 15;
            const SUB_DIVISIONS = 2;
            const SUB_CELLS = SUB_DIVISIONS ** 2;
            const COINS_PER_LB = 50;
            const COINPURSE_POUCH_CAP = 6;   // lbs of coins before a new pouch is needed
            const COINPURSE_MAX_POUCHES = 5;  // maximum pouches (= max 5 cells wide)
            const GRID_SUB_ROWS = strength * SUB_DIVISIONS;
            const GRID_SUB_COLS = COLS * SUB_DIVISIONS;
            const ITEM_TYPES = {
                armor: { name: 'Armor', color: '#4B5563' },
                weapon: { name: 'Weapon', color: '#9CA3AF' },
                supply: { name: 'Supply', color: '#FCD34D' },
                container: { name: 'Container', color: '#92400E' },
                potion: { name: 'Potion', color: '#3B82F6' }
            };

            // Computes the number of sub-cells an item-in-creation must fill,
            // based on the current form state. Used during shape painting and validation.
            const calcTargetSubCells = () => {
                const isContainer = newItemType === 'container';
                if (isContainer && newItemContainerSubtype === 'quantity') {
                    return Math.ceil(((parseFloat(newItemBaseWeight) || 1) + (parseFloat(newItemFilledWeight) || 0)) * SUB_CELLS);
                } else if (isContainer) {
                    // grid and coinpurse paint shape from empty/base weight only
                    return Math.ceil((parseFloat(newItemBaseWeight) || 1) * SUB_CELLS);
                } else {
                    return Math.ceil((parseFloat(newItemWeight) || 1) * SUB_CELLS);
                }
            };

            const getCreationGridSize = () => {
                let weight;
                if (newItemType === 'container') {
                    if (newItemContainerSubtype === 'quantity') {
                        // Quantity container: empty + full contents
                        const baseW = parseFloat(newItemBaseWeight) || 1;
                        const contentsW = parseFloat(newItemFilledWeight) || 0;
                        weight = baseW + contentsW;
                    } else {
                        // Grid container and coinpurse: paint from empty/base weight only
                        const baseW = parseFloat(newItemBaseWeight) || 1;
                        weight = baseW;
                    }
                } else {
                    weight = parseFloat(newItemWeight) || 1;
                }
                weight = Math.max(0.25, weight);
                return {
                    width: Math.min(10, Math.ceil(weight) * SUB_DIVISIONS),
                    height: Math.ceil(weight) * SUB_DIVISIONS
                };
            }

            const modifyShapeCell = (row, col, mode) => {
                const cellKey = `${row},${col}`;
                const targetSubCells = calcTargetSubCells();

                setNewItemShape(prev => {
                    const includes = prev.includes(cellKey);
                    if (mode === 'add' && !includes && prev.length < targetSubCells) {
                        return [...prev, cellKey];
                    } else if (mode === 'remove' && includes) {
                        return prev.filter(c => c !== cellKey);
                    }
                    return prev;
                });
            };

            const modifyShapeCellBlock = (fullCellRow, fullCellCol, mode) => {
                const targetSubCells = calcTargetSubCells();

                const subCells = [];
                for (let sr = 0; sr < SUB_DIVISIONS; sr++) {
                    for (let sc = 0; sc < SUB_DIVISIONS; sc++) {
                        subCells.push(`${fullCellRow * SUB_DIVISIONS + sr},${fullCellCol * SUB_DIVISIONS + sc}`);
                    }
                }

                setNewItemShape(prev => {
                    if (mode === 'add') {
                        const toAdd = subCells.filter(cell => !prev.includes(cell));
                        const newShape = [...prev, ...toAdd].slice(0, targetSubCells);
                        return newShape;
                    } else if (mode === 'remove') {
                        return prev.filter(cell => !subCells.includes(cell));
                    }
                    return prev;
                });
            };

            const saveNewItem = () => {
              let weight, emptyWeight = 0, contentsWeight = 0, maxUnits = 0;
              const isContainer = newItemType === 'container';
              const containerType = isContainer ? newItemContainerSubtype : null;
              let internalCapacity = 0;
              let externalSlots = [];

              if (isContainer) {
                if (containerType === 'grid') {
                  const baseW = parseFloat(newItemBaseWeight);
                  const capacity = parseFloat(newItemInternalCapacity);
                  const numSlots = parseInt(newItemExternalSlots) || 0;
                  const slotWeight = parseFloat(newItemExternalSlotWeight) || 0;

                  if (!newItemName || isNaN(baseW) || isNaN(capacity) || baseW <= 0 || capacity <= 0) return;

                  weight = baseW;
                  emptyWeight = baseW;
                  internalCapacity = capacity;

                  for (let i = 0; i < numSlots; i++) {
                    externalSlots.push({ id: i + 1, maxWeight: slotWeight, occupied: null });
                  }

                } else if (containerType === 'quantity') {
                  const baseW = parseFloat(newItemBaseWeight);
                  const fillW = parseFloat(newItemFilledWeight);
                  const units = parseInt(newItemMaxUnits);
                  if (!newItemName || isNaN(baseW) || isNaN(fillW) || isNaN(units) || baseW <= 0 || fillW <= 0 || units <= 0) return;
                  weight = baseW + fillW;
                  emptyWeight = baseW;
                  contentsWeight = fillW;
                  maxUnits = units;

                } else { // coinpurse
                  const baseW = parseFloat(newItemBaseWeight);
                  if (!newItemName || isNaN(baseW) || baseW <= 0) return;
                  weight = baseW;
                  emptyWeight = baseW;
                  // columnCap and maxColumns validated below when building the item
                }
              } else {
                weight = parseFloat(newItemWeight);
                if (!newItemName || isNaN(weight) || weight <= 0) return;
              }

              const targetSubCells = calcTargetSubCells();
              if (newItemShape.length !== targetSubCells) return;

              const sortedShape = [...newItemShape].sort((a, b) => {
                const [ar, ac] = a.split(',').map(Number);
                const [br, bc] = b.split(',').map(Number);
                return ar !== br ? ar - br : ac - bc;
              });

              const itemColor = newItemType === 'potion' ? newItemColor : ITEM_TYPES[newItemType].color;

              const newItem = {
                id: Date.now(),
                name: newItemName,
                weight,
                shape: sortedShape,
                type: newItemType,
                color: itemColor,
                containerType,
                emptyWeight,
                contentsWeight,
                maxUnits,
                currentUnits: containerType === 'quantity' ? maxUnits : null,
                currentWeight: containerType === 'grid' ? emptyWeight : weight,
                scaleDirection: containerType === 'quantity' ? newItemScaleDirection : null,
                internalCapacity,
                internalGrid: containerType === 'grid' ? [] : undefined,
                externalSlots: containerType === 'grid' ? externalSlots : undefined,
                coins: containerType === 'coinpurse' ? { cp: 0, sp: 0, ep: 0, gp: 0, pp: 0 } : undefined,
                columnCap: containerType === 'coinpurse' ? (parseFloat(newItemColumnCap) || COINPURSE_POUCH_CAP) : undefined,
                maxColumns: containerType === 'coinpurse' ? (parseInt(newItemMaxColumns) || COINPURSE_MAX_POUCHES) : undefined
              };

              setItems([...items, newItem]);
              setIsCreatingItem(false);
              resetItemCreation();
            };

            const resetItemCreation = () => {
                setNewItemName('');
                setNewItemWeight('');
                setNewItemBaseWeight('');
                setNewItemFilledWeight('');
                setNewItemMaxUnits('');
                setNewItemShape([]);
                setNewItemType('weapon');
                setNewItemColor('#3B82F6');
                setNewItemScaleDirection('vertical');
                setNewItemContainerSubtype('quantity');
                setNewItemColumnCap('');
                setNewItemMaxColumns('');
                setNewItemInternalCapacity('');
                setNewItemExternalSlots(2);
                setNewItemExternalSlotWeight('10');
            };

            const getShapeBounds = (shape) => {
                const coords = shape.map(cell => cell.split(',').map(Number));
                const rows = coords.map(c => c[0]);
                const cols = coords.map(c => c[1]);
                return {
                    minRow: Math.min(...rows),
                    maxRow: Math.max(...rows),
                    minCol: Math.min(...cols),
                    maxCol: Math.max(...cols),
                    centerRow: (Math.min(...rows) + Math.max(...rows)) / 2,
                    centerCol: (Math.min(...cols) + Math.max(...cols)) / 2
                };
            };

            const calculateInternalWeight = (container) => {
              if (container.containerType !== 'grid') return 0;
              return container.internalGrid.reduce((sum, item) => sum + (item.currentWeight || item.weight), 0);
            };

            const getScaledContainerShape = (item) => {
              if (item.containerType === null) return item.shape;

              let currentWeight;
              if (item.containerType === 'grid') {
                currentWeight = item.emptyWeight + calculateInternalWeight(item) + calculateExternalWeight(item);
              } else if (item.containerType === 'coinpurse') {
                // Pouch-column model: each column = 1 pouch (emptyWeight lb + up to columnCap lb coins)
                // Shape is computed entirely from coin count — base shape is ignored at render time.
                const colCap = item.columnCap || COINPURSE_POUCH_CAP;
                const maxCols = item.maxColumns || COINPURSE_MAX_POUCHES;
                const totalCoins = Object.values(item.coins || {}).reduce((s, v) => s + v, 0);
                const coinWeight = totalCoins / COINS_PER_LB;
                const numPouches = Math.min(maxCols, Math.max(1, Math.ceil(coinWeight / colCap)));
                const fullColSubRows = Math.ceil((item.emptyWeight + colCap) * SUB_DIVISIONS);
                const coinWeightInLastPouch = Math.max(0, coinWeight - (numPouches - 1) * colCap);
                // Cap last column at full height when at max pouches
                const cappedCoinWeightInLast = numPouches >= maxCols
                  ? Math.min(coinWeightInLastPouch, colCap)
                  : coinWeightInLastPouch;
                const lastColSubRows = Math.max(
                  Math.ceil(item.emptyWeight * SUB_DIVISIONS),
                  Math.min(fullColSubRows, Math.ceil((item.emptyWeight + cappedCoinWeightInLast) * SUB_DIVISIONS))
                );
                const shape = [];
                for (let p = 0; p < numPouches; p++) {
                  const colSubRows = p < numPouches - 1 ? fullColSubRows : lastColSubRows;
                  for (let r = 0; r < colSubRows; r++) {
                    for (let sc = 0; sc < SUB_DIVISIONS; sc++) {
                      shape.push(`${r},${p * SUB_DIVISIONS + sc}`);
                    }
                  }
                }
                return shape; // normalized 0-based; bypasses generic expand/trim
              } else {
                // quantity
                const unitWeight = item.contentsWeight / item.maxUnits;
                currentWeight = item.emptyWeight + (item.currentUnits * unitWeight);
              }

              const targetSubCells = Math.ceil(currentWeight * SUB_CELLS);
              const baseSubCells = item.shape.length;
              const bounds = getShapeBounds(item.shape);
              const normalized = item.shape.map(cell => {
                const [r, c] = cell.split(',').map(Number);
                return `${r - bounds.minRow},${c - bounds.minCol}`;
              });

              // EXPAND if we need more cells
              if (targetSubCells >= baseSubCells) {
                const cellsToAdd = targetSubCells - baseSubCells;

                if (cellsToAdd === 0) return normalized; // No change needed

                const expandedShape = [...normalized];

                if (item.containerType === 'grid') {
                  // Grid containers: expand vertically (downward), respecting 5-cell width limit
                  const maxRow = Math.max(...normalized.map(cell => parseInt(cell.split(',')[0])));
                  const maxCol = Math.max(...normalized.map(cell => parseInt(cell.split(',')[1])));
                  const width = maxCol + 1; // Current width in sub-cells

                  let currentRow = maxRow + 1;
                  let addedCells = 0;

                  // Add rows from bottom, maintaining current width
                  while (addedCells < cellsToAdd) {
                    for (let c = 0; c < width && addedCells < cellsToAdd; c++) {
                      expandedShape.push(`${currentRow},${c}`);
                      addedCells++;
                    }
                    currentRow++;
                  }

                  return expandedShape;
                } else {
                  // Quantity/coinpurse: expand based on scale direction (coinpurse defaults to vertical)
                  const scaleDir = item.scaleDirection || 'vertical';
                  if (scaleDir === 'vertical') {
                    const maxRow = Math.max(...normalized.map(cell => parseInt(cell.split(',')[0])));
                    const cellsByCol = {};
                    normalized.forEach(cell => {
                      const [r, c] = cell.split(',').map(Number);
                      if (!cellsByCol[c]) cellsByCol[c] = [];
                      cellsByCol[c].push(r);
                    });

                    let addedCells = 0;
                    let currentRow = maxRow + 1;
                    while (addedCells < cellsToAdd) {
                      Object.keys(cellsByCol).forEach(col => {
                        if (addedCells < cellsToAdd) {
                          expandedShape.push(`${currentRow},${col}`);
                          addedCells++;
                        }
                      });
                      currentRow++;
                    }
                    return expandedShape;
                  } else {
                    // Horizontal expansion
                    const maxCol = Math.max(...normalized.map(cell => parseInt(cell.split(',')[1])));
                    const cellsByRow = {};
                    normalized.forEach(cell => {
                      const [r, c] = cell.split(',').map(Number);
                      if (!cellsByRow[r]) cellsByRow[r] = [];
                      cellsByRow[r].push(c);
                    });

                    let addedCells = 0;
                    let currentCol = maxCol + 1;
                    while (addedCells < cellsToAdd) {
                      Object.keys(cellsByRow).forEach(row => {
                        if (addedCells < cellsToAdd) {
                          expandedShape.push(`${row},${currentCol}`);
                          addedCells++;
                        }
                      });
                      currentCol++;
                    }
                    return expandedShape;
                  }
                }
              }

              // TRIM if we need fewer cells
              const cellsToRemove = baseSubCells - targetSubCells;
              let trimmedShape = [...normalized];

              if (item.containerType === 'grid') {
                trimmedShape = trimmedShape
                  .map(cell => {
                    const [r, c] = cell.split(',').map(Number);
                    return { cell, r, c };
                  })
                  .sort((a, b) => b.r - a.r) // Sort descending to trim from bottom
                  .slice(cellsToRemove)
                  .map(obj => obj.cell);
              } else {
                // Quantity/coinpurse trim logic based on scale direction
                const trimDir = item.scaleDirection || 'vertical';
                if (trimDir === 'vertical') {
                  trimmedShape = trimmedShape
                    .map(cell => {
                      const [r, c] = cell.split(',').map(Number);
                      return { cell, r, c };
                    })
                    .sort((a, b) => b.r - a.r)
                    .slice(cellsToRemove)
                    .map(obj => obj.cell);
                } else {
                  trimmedShape = trimmedShape
                    .map(cell => {
                      const [r, c] = cell.split(',').map(Number);
                      return { cell, r, c };
                    })
                    .sort((a, b) => a.c - b.c)
                    .slice(cellsToRemove)
                    .map(obj => obj.cell);
                }
              }

              return trimmedShape;
            };

            // --- Grid utility functions ---

            const calculateExternalWeight = (container) => {
              if (container.containerType !== 'grid' || !container.externalSlots) return 0;
              return container.externalSlots.reduce((sum, slot) => {
                if (!slot.occupied) return sum;
                return sum + (slot.occupied.currentWeight || slot.occupied.weight);
              }, 0);
            };

            const clampPosition = (row, col, bounds, subRows, subCols) => ({
              row: Math.max(-bounds.minRow, Math.min(subRows - bounds.maxRow - 1, row)),
              col: Math.max(-bounds.minCol, Math.min(subCols - bounds.maxCol - 1, col)),
            });

            const resolveDropPosition = (clientX, clientY, dragOffset, gridRect, subCellSize, bounds, subRows, subCols) => {
              const row = Math.round((clientY - gridRect.top - dragOffset.y) / subCellSize);
              const col = Math.round((clientX - gridRect.left - dragOffset.x) / subCellSize);
              const isOutOfBounds = row + bounds.minRow < 0 || row + bounds.maxRow >= subRows ||
                                    col + bounds.minCol < 0 || col + bounds.maxCol >= subCols;
              return { row, col, isOutOfBounds };
            };

            const getInternalDimensions = (container) => {
              const internalFullRows = Math.ceil(container.internalCapacity / 5);
              return {
                subRows: internalFullRows * SUB_DIVISIONS,
                subCols: 5 * SUB_DIVISIONS,
              };
            };

            const rotateItem = (itemId) => {
                // Check if item is in an internal grid
                if (openContainerId) {
                    const container = placedItems.find(c => c.id === openContainerId);
                    const internalItem = container?.internalGrid.find(i => i.id === itemId);

                    if (internalItem) {
                        setPlacedItems(prev => prev.map(c => {
                            if (c.id === openContainerId) {
                                const bounds = getShapeBounds(internalItem.shape);
                                const rotatedShape = internalItem.shape.map(cell => {
                                    const [r, c] = cell.split(',').map(Number);
                                    const relR = r - bounds.centerRow;
                                    const relC = c - bounds.centerCol;
                                    return `${Math.round(relC + bounds.centerRow)},${Math.round(-relR + bounds.centerCol)}`;
                                });
                                const newBounds = getShapeBounds(rotatedShape);
                                const { subRows: internalSubRows, subCols: internalSubCols } = getInternalDimensions(c);
                                const { row: newRow, col: newCol } = clampPosition(
                                  internalItem.position.row, internalItem.position.col, newBounds, internalSubRows, internalSubCols
                                );

                                return {
                                    ...c,
                                    internalGrid: c.internalGrid.map(i => i.id === itemId ?
                                        { ...i, shape: rotatedShape, position: { row: newRow, col: newCol } } : i)
                                };
                            }
                            return c;
                        }));
                        return;
                    }
                }

                // Original main grid rotation logic
                setPlacedItems(prev => prev.map(item => {
                    if (item.id === itemId && item.containerType === null) {
                        const bounds = getShapeBounds(item.shape);
                        const rotatedShape = item.shape.map(cell => {
                            const [r, c] = cell.split(',').map(Number);
                            const relR = r - bounds.centerRow;
                            const relC = c - bounds.centerCol;
                            return `${Math.round(relC + bounds.centerRow)},${Math.round(-relR + bounds.centerCol)}`;
                        });
                        const newBounds = getShapeBounds(rotatedShape);
                        const { row: newRow, col: newCol } = clampPosition(
                          item.position.row, item.position.col, newBounds, GRID_SUB_ROWS, GRID_SUB_COLS
                        );
                        return { ...item, shape: rotatedShape, position: { row: newRow, col: newCol } };
                    }
                    return item;
                }));
            };

            const flipItem = (itemId) => {
                // Check if item is in an internal grid
                if (openContainerId) {
                    const container = placedItems.find(c => c.id === openContainerId);
                    const internalItem = container?.internalGrid.find(i => i.id === itemId);

                    if (internalItem) {
                        setPlacedItems(prev => prev.map(c => {
                            if (c.id === openContainerId) {
                                const bounds = getShapeBounds(internalItem.shape);
                                const flippedShape = internalItem.shape.map(cell => {
                                    const [r, c] = cell.split(',').map(Number);
                                    const relC = c - bounds.centerCol;
                                    return `${r},${Math.round(-relC + bounds.centerCol)}`;
                                });
                                return {
                                    ...c,
                                    internalGrid: c.internalGrid.map(i => i.id === itemId ?
                                        { ...i, shape: flippedShape } : i)
                                };
                            }
                            return c;
                        }));
                        return;
                    }
                }

                // Original main grid flip logic
                setPlacedItems(prev => prev.map(item => {
                    if (item.id === itemId) {
                        const bounds = getShapeBounds(item.shape);
                        const flippedShape = item.shape.map(cell => {
                            const [r, c] = cell.split(',').map(Number);
                            const relC = c - bounds.centerCol;
                            return `${r},${Math.round(-relC + bounds.centerCol)}`;
                        });
                        return { ...item, shape: flippedShape };
                    }
                    return item;
                }));
            };

            const adjustContainerQuantity = (itemId, delta) => {
                // Check if item is in internal grid
                if (openContainerId) {
                    const container = placedItems.find(c => c.id === openContainerId);
                    const internalItem = container?.internalGrid.find(i => i.id === itemId);

                    if (internalItem && internalItem.containerType === 'quantity') {
                        setPlacedItems(prev => prev.map(c => {
                            if (c.id === openContainerId) {
                                return {
                                    ...c,
                                    internalGrid: c.internalGrid.map(i => {
                                        if (i.id === itemId) {
                                            const newUnits = Math.max(0, Math.min(i.maxUnits, i.currentUnits + delta));
                                            const unitWeight = i.contentsWeight / i.maxUnits;
                                            const newWeight = i.emptyWeight + (newUnits * unitWeight);
                                            return { ...i, currentUnits: newUnits, currentWeight: newWeight };
                                        }
                                        return i;
                                    })
                                };
                            }
                            return c;
                        }));
                        return;
                    }
                }

                // Original main grid logic
                setPlacedItems(prev => prev.map(item => {
                    if (item.id === itemId && item.containerType === 'quantity') {
                        const newUnits = Math.max(0, Math.min(item.maxUnits, item.currentUnits + delta));
                        const unitWeight = item.contentsWeight / item.maxUnits;
                        const newWeight = item.emptyWeight + (newUnits * unitWeight);
                        const updatedItem = { ...item, currentUnits: newUnits, currentWeight: newWeight };
                        const newShape = getScaledContainerShape(updatedItem);
                        const newBounds = getShapeBounds(newShape);

                        let newRow = item.position.row;
                        let newCol = item.position.col;

                        if (newRow + newBounds.minRow < 0) {
                            newRow = -newBounds.minRow;
                        }
                        if (newRow + newBounds.maxRow >= GRID_SUB_ROWS) {
                            newRow = GRID_SUB_ROWS - 1 - (newBounds.maxRow - newBounds.minRow);
                        }
                        if (newCol + newBounds.minCol < 0) {
                            newCol = -newBounds.minCol;
                        }
                        if (newCol + newBounds.maxCol >= GRID_SUB_COLS) {
                            newCol = GRID_SUB_COLS - 1 - (newBounds.maxCol - newBounds.minCol);
                        }

                        return { ...updatedItem, position: { row: newRow, col: newCol } };
                    }
                    return item;
                }));
            };

            const updateCoinpurseCoins = (itemId, coinType, newValue) => {
                setPlacedItems(prev => prev.map(item => {
                    if (item.id !== itemId || item.containerType !== 'coinpurse') return item;
                    const newCoins = { ...item.coins, [coinType]: Math.max(0, newValue) };
                    const totalCoins = Object.values(newCoins).reduce((s, v) => s + v, 0);
                    const coinWeight = totalCoins / COINS_PER_LB;
                    const colCap = item.columnCap || COINPURSE_POUCH_CAP;
                    const maxCols = item.maxColumns || COINPURSE_MAX_POUCHES;
                    const numPouches = Math.min(maxCols, Math.max(1, Math.ceil(coinWeight / colCap)));
                    const newWeight = item.emptyWeight * numPouches + coinWeight;
                    const updatedItem = { ...item, coins: newCoins, currentWeight: newWeight };
                    const newShape = getScaledContainerShape(updatedItem);
                    const newBounds = getShapeBounds(newShape);
                    let newRow = item.position.row;
                    let newCol = item.position.col;
                    if (newRow + newBounds.minRow < 0) newRow = -newBounds.minRow;
                    if (newRow + newBounds.maxRow >= GRID_SUB_ROWS) newRow = GRID_SUB_ROWS - 1 - (newBounds.maxRow - newBounds.minRow);
                    if (newCol + newBounds.minCol < 0) newCol = -newBounds.minCol;
                    if (newCol + newBounds.maxCol >= GRID_SUB_COLS) newCol = GRID_SUB_COLS - 1 - (newBounds.maxCol - newBounds.minCol);
                    return { ...updatedItem, position: { row: newRow, col: newCol } };
                }));
            };

            const removeItem = (itemId) => {
                // Check if item is in internal grid
                if (openContainerId) {
                    const container = placedItems.find(c => c.id === openContainerId);
                    const internalItem = container?.internalGrid.find(i => i.id === itemId);

                    if (internalItem) {
                        setPlacedItems(prev => prev.map(c => {
                            if (c.id === openContainerId) {
                                const newInternalWeight = calculateInternalWeight(c) - internalItem.weight;
                                return {
                                    ...c,
                                    internalGrid: c.internalGrid.filter(i => i.id !== itemId),
                                    currentWeight: c.emptyWeight + newInternalWeight + calculateExternalWeight(c)
                                };
                            }
                            return c;
                        }));
                        setSelectedItemId(null);
                        setShowDropConfirm(false);
                        return;
                    }
                }

                // Original main grid logic
                setPlacedItems(prev => prev.filter(item => item.id !== itemId));
                setSelectedItemId(null);
                setShowDropConfirm(false);
            };

            const setItemDown = (itemId) => {
                const item = placedItems.find(i => i.id === itemId);
                if (!item) return;
                setSetAsideItems(prev => [...prev, { ...item, setAsideId: Date.now() + Math.random() }]);
                setPlacedItems(prev => prev.filter(i => i.id !== itemId));
                setSelectedItemId(null);
            };

            const pickUpItem = (itemId) => {
                const item = setAsideItems.find(i => i.id === itemId);
                if (!item) return;
                const { setAsideId: _, ...itemWithoutSetAsideId } = item;
                setPlacementMode({ item: itemWithoutSetAsideId, source: 'setAside', setAsideId: itemId });
            };

            const addItemToGrid = (itemTemplate, targetContainerId = null) => {
              const newPlaced = {
                ...itemTemplate,
                id: Date.now() + Math.random(),
                position: { row: 0, col: 0 },
                shape: [...itemTemplate.shape]
              };

              if (targetContainerId) {
                // Adding directly to internal grid — place at (0,0) with clamp as before
                const shape = getScaledContainerShape(newPlaced);
                const bounds = getShapeBounds(shape);
                const { row: newRow, col: newCol } = clampPosition(0, 0, bounds, GRID_SUB_ROWS, GRID_SUB_COLS);
                newPlaced.position = { row: newRow, col: newCol };
                setPlacedItems(prev => prev.map(container => {
                  if (container.id === targetContainerId && container.containerType === 'grid') {
                    const internalWeight = calculateInternalWeight(container);
                    if (internalWeight + newPlaced.weight > container.internalCapacity) {
                      alert('Exceeds internal capacity!');
                      return container;
                    }
                    return {
                      ...container,
                      internalGrid: [...container.internalGrid, newPlaced],
                      currentWeight: container.emptyWeight + internalWeight + newPlaced.weight + calculateExternalWeight(container)
                    };
                  }
                  return container;
                }));
              } else {
                // Enter placement mode — user taps grid to place
                setPlacementMode({ item: newPlaced, source: 'library' });
                setSelectedItemId(null);
              }
            };

            const getEncumbranceZone = (col) => {
                if (col < 5) return 'comfortable';
                if (col < 10) return 'encumbered';
                return 'heavy';
            };

            const getCellColor = (col) => {
                const zone = getEncumbranceZone(col);
                if (zone === 'comfortable') return 'bg-blue-200';
                if (zone === 'encumbered') return 'bg-orange-200';
                return 'bg-red-200';
            };

            const handleItemClick = (e, item) => {
                if (!showDropConfirm) { // Only allow selection changes when not confirming drop
                    setSelectedItemId(item.id);
                }
            };

            const handleItemDragStart = (e, item) => {
              e.preventDefault();
              e.stopPropagation();

              const clientX = e.clientX;
              const clientY = e.clientY;

              // Determine which grid we're working with
              const isInternalGrid = openContainerId && internalGridRef.current &&
                                     internalGridRef.current.contains(e.target);
              const gridElement = isInternalGrid ? internalGridRef.current : gridRef.current;

              if (!gridElement) return;

              const rect = gridElement.getBoundingClientRect();

              // Calculate drag offset
              const offset = {
                x: clientX - rect.left - (item.position.col * subCellSize),
                y: clientY - rect.top - (item.position.row * subCellSize)
              };

              // Set refs FIRST
              dragOffsetRef.current = offset;
              draggedFromInternalRef.current = isInternalGrid;

              // Batch state updates
              setSelectedItemId(item.id);
              setDragStartPosition({ row: item.position.row, col: item.position.col });
              setDragStartClient({ x: clientX, y: clientY });
              setDragOffset(offset);
              setDraggedFromInternal(isInternalGrid);
              setIsPanning(false);
              setDraggedItem(item.id);
            };

            const handlePointerEnd = (e) => {
              if (draggedItem) {
                let clientX, clientY;
                if (e.type.startsWith('touch')) {
                  clientX = e.changedTouches[0].clientX;
                  clientY = e.changedTouches[0].clientY;
                } else {
                  clientX = e.clientX;
                  clientY = e.clientY;
                }

                const dx = clientX - dragStartClient.x;
                const dy = clientY - dragStartClient.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Get the item from the appropriate location
                let item, isItemContainer;
                if (draggedFromInternalRef.current && openContainerId) {
                  const container = placedItems.find(c => c.id === openContainerId);
                  item = container?.internalGrid.find(i => i.id === draggedItem);
                  isItemContainer = item?.containerType !== null;
                } else {
                  item = placedItems.find(i => i.id === draggedItem);
                  isItemContainer = item?.containerType !== null;
                }

                // Handle rotation for short drag distances (tap/click)
                // Only rotate if distance is very small (< 5 pixels) and item is not a container
                const shouldRotate = item && distance < 5 && !isItemContainer;

                if (shouldRotate) {
                  if (draggedFromInternalRef.current && openContainerId) {
                    setPlacedItems(prev => prev.map(container => {
                      if (container.id === openContainerId) {
                        const bounds = getShapeBounds(item.shape);
                        const rotatedShape = item.shape.map(cell => {
                          const [r, c] = cell.split(',').map(Number);
                          const relR = r - bounds.centerRow;
                          const relC = c - bounds.centerCol;
                          return `${Math.round(relC + bounds.centerRow)},${Math.round(-relR + bounds.centerCol)}`;
                        });

                        return {
                          ...container,
                          internalGrid: container.internalGrid.map(i => i.id === item.id ?
                            { ...i, shape: rotatedShape } : i)
                        };
                      }
                      return container;
                    }));
                  } else {
                    rotateItem(item.id);
                  }

                  // Clear drag state immediately after rotation
                  setDraggedItem(null);
                  setDragStartPosition(null);
                  setDragStartClient(null);
                  setDraggedFromInternal(false);
                  draggedFromInternalRef.current = false;
                  setIsPanning(false);
                  return; // Exit early, don't process as a drag
                }

                // Snap-back logic: Check if item should be returned to valid position
                let itemWasHandled = false;

                // Handle drop for items dragged from an attachment slot
                if (draggedFromSlotRef.current !== -1 && draggedSlotItemRef.current) {
                  const slotItem = draggedSlotItemRef.current;
                  const sourceSlotIndex = draggedFromSlotRef.current;
                  const container = placedItems.find(c => c.id === openContainerId);

                  const detachFromSlot = (updater) => {
                    setPlacedItems(prev => prev.map(c => {
                      if (c.id !== openContainerId) return c;
                      const newExternalSlots = c.externalSlots.map((s, idx) =>
                        idx === sourceSlotIndex ? { ...s, occupied: null } : s
                      );
                      return updater(c, newExternalSlots);
                    }));
                  };

                  const snapBackToSlot = () => {
                    // Do nothing — item is still in slot.occupied, just clear drag state
                  };

                  if (gridRef.current) {
                    const mainGridRect = gridRef.current.getBoundingClientRect();
                    const isOverMainGrid = clientX >= mainGridRect.left && clientX <= mainGridRect.right &&
                                          clientY >= mainGridRect.top && clientY <= mainGridRect.bottom;

                    const shape = getScaledContainerShape(slotItem);
                    const bounds = getShapeBounds(shape);
                    const { row: newRow, col: newCol, isOutOfBounds } = resolveDropPosition(
                      clientX, clientY, dragOffset, mainGridRect, subCellSize, bounds, GRID_SUB_ROWS, GRID_SUB_COLS
                    );

                    const isOverAttachmentSlots = attachmentSlotRefs.current.some((el, idx) => {
                      if (!el || idx === sourceSlotIndex) return false;
                      const r = el.getBoundingClientRect();
                      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
                    });

                    const targetSlotIndex = attachmentSlotRefs.current.findIndex((el, idx) => {
                      if (!el || idx === sourceSlotIndex) return false;
                      const r = el.getBoundingClientRect();
                      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
                    });

                    if (openContainerId && internalGridRef.current) {
                      const internalRect = internalGridRef.current.getBoundingClientRect();
                      const anchorCol = Math.round((clientX - internalRect.left - dragOffset.x) / subCellSize);
                      const anchorRow = Math.round((clientY - internalRect.top - dragOffset.y) / subCellSize);
                      const itemLeft   = internalRect.left + (anchorCol + bounds.minCol) * subCellSize;
                      const itemRight  = internalRect.left + (anchorCol + bounds.maxCol + 1) * subCellSize;
                      const itemTop    = internalRect.top  + (anchorRow + bounds.minRow) * subCellSize;
                      const itemBottom = internalRect.top  + (anchorRow + bounds.maxRow + 1) * subCellSize;
                      const isItemOverInternal = itemLeft >= internalRect.left && itemRight <= internalRect.right &&
                                                 itemTop >= internalRect.top && itemBottom <= internalRect.bottom;

                      if (isOverAttachmentSlots && targetSlotIndex !== -1 && container) {
                        // Slot-to-slot takes priority
                        const targetSlot = container.externalSlots[targetSlotIndex];
                        if (targetSlot.occupied) {
                          snapBackToSlot();
                        } else if ((slotItem.currentWeight || slotItem.weight) > targetSlot.maxWeight) {
                          alert(`Item too heavy for this slot (max ${targetSlot.maxWeight} lbs)`);
                          snapBackToSlot();
                        } else {
                          setPlacedItems(prev => prev.map(c => {
                            if (c.id !== openContainerId) return c;
                            const newExternalSlots = c.externalSlots.map((s, idx) => {
                              if (idx === sourceSlotIndex) return { ...s, occupied: null };
                              if (idx === targetSlotIndex) return { ...s, occupied: slotItem };
                              return s;
                            });
                            const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                            return {
                              ...c,
                              externalSlots: newExternalSlots,
                              currentWeight: c.emptyWeight + calculateInternalWeight(c) + newExternalWeight
                            };
                          }));
                        }
                      } else if (isItemOverInternal && container) {
                        // Internal grid is next priority
                        const internalWeight = calculateInternalWeight(container);
                        if (internalWeight + slotItem.weight > container.internalCapacity) {
                          alert('Exceeds internal capacity!');
                          snapBackToSlot();
                        } else {
                          const { subRows: internalSubRows, subCols: internalSubCols } = getInternalDimensions(container);
                          const { row: iRow, col: iCol } = clampPosition(anchorRow, anchorCol, bounds, internalSubRows, internalSubCols);
                          detachFromSlot((c, newExternalSlots) => {
                            const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                            return {
                              ...c,
                              externalSlots: newExternalSlots,
                              internalGrid: [...c.internalGrid, { ...slotItem, position: { row: iRow, col: iCol } }],
                              currentWeight: c.emptyWeight + internalWeight + slotItem.weight + newExternalWeight
                            };
                          });
                        }
                      } else if (isOverMainGrid && !isOutOfBounds) {
                        // Main grid is lowest priority
                        detachFromSlot((c, newExternalSlots) => {
                          const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                          return {
                            ...c,
                            externalSlots: newExternalSlots,
                            currentWeight: c.emptyWeight + calculateInternalWeight(c) + newExternalWeight
                          };
                        });
                        setPlacedItems(prev => [...prev, { ...slotItem, position: { row: newRow, col: newCol } }]);
                      } else {
                        snapBackToSlot();
                      }
                    } else if (isOverMainGrid && !isOutOfBounds) {
                      // No overlay open — drop onto main grid
                      detachFromSlot((c, newExternalSlots) => {
                        const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                        return {
                          ...c,
                          externalSlots: newExternalSlots,
                          currentWeight: c.emptyWeight + calculateInternalWeight(c) + newExternalWeight
                        };
                      });
                      setPlacedItems(prev => [...prev, { ...slotItem, position: { row: newRow, col: newCol } }]);
                    } else {
                      snapBackToSlot();
                    }
                  }

                  // Clear slot drag state
                  draggedFromSlotRef.current = -1;
                  draggedSlotItemRef.current = null;
                  itemWasHandled = true;
                }

                // Check if dropped over internal grid (if open)
                if (openContainerId && internalGridRef.current && item) {
                  const internalRect = internalGridRef.current.getBoundingClientRect();

                  if (draggedFromInternal) {
                    // Dragging FROM internal grid
                    const container = placedItems.find(c => c.id === openContainerId);
                    const draggedInternalItem = container.internalGrid.find(i => i.id === draggedItem);

                    if (draggedInternalItem && gridRef.current) {
                      const mainGridRect = gridRef.current.getBoundingClientRect();

                      // Shape-aware internal grid check: compute where the item's body would land
                      // and verify the full bounding box fits within the internal grid rect
                      const shape = getScaledContainerShape(draggedInternalItem);
                      const bounds = getShapeBounds(shape);
                      const anchorCol = Math.round((clientX - internalRect.left - dragOffset.x) / subCellSize);
                      const anchorRow = Math.round((clientY - internalRect.top - dragOffset.y) / subCellSize);
                      const itemLeft   = internalRect.left + (anchorCol + bounds.minCol) * subCellSize;
                      const itemRight  = internalRect.left + (anchorCol + bounds.maxCol + 1) * subCellSize;
                      const itemTop    = internalRect.top  + (anchorRow + bounds.minRow) * subCellSize;
                      const itemBottom = internalRect.top  + (anchorRow + bounds.maxRow + 1) * subCellSize;
                      const isItemOverInternal = itemLeft >= internalRect.left && itemRight <= internalRect.right &&
                                                 itemTop >= internalRect.top && itemBottom <= internalRect.bottom;

                      const isOverMainGrid = clientX >= mainGridRect.left && clientX <= mainGridRect.right &&
                                             clientY >= mainGridRect.top && clientY <= mainGridRect.bottom;

                      // Check if cursor is over any individual attachment slot cell (valid non-snap-back target)
                      const isOverAttachmentSlots = attachmentSlotRefs.current.some(el => {
                        if (!el) return false;
                        const r = el.getBoundingClientRect();
                        return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
                      });

                      if (isOverAttachmentSlots) {
                        // Attachment slot takes highest priority — find which one
                        const slotIndex = attachmentSlotRefs.current.findIndex(el => {
                          if (!el) return false;
                          const r = el.getBoundingClientRect();
                          return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
                        });
                        if (slotIndex !== -1) {
                          const targetSlot = container.externalSlots[slotIndex];
                          if (targetSlot.occupied) {
                            // Slot already occupied — snap back
                            setPlacedItems(prev => prev.map(c => {
                              if (c.id !== openContainerId) return c;
                              return {
                                ...c,
                                internalGrid: c.internalGrid.map(i =>
                                  i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                                )
                              };
                            }));
                          } else if ((draggedInternalItem.currentWeight || draggedInternalItem.weight) > targetSlot.maxWeight) {
                            alert(`Item too heavy for this slot (max ${targetSlot.maxWeight} lbs)`);
                            setPlacedItems(prev => prev.map(c => {
                              if (c.id !== openContainerId) return c;
                              return {
                                ...c,
                                internalGrid: c.internalGrid.map(i =>
                                  i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                                )
                              };
                            }));
                          } else {
                            // Attach: remove from internal grid, store in slot
                            setPlacedItems(prev => prev.map(c => {
                              if (c.id !== openContainerId) return c;
                              const newInternalGrid = c.internalGrid.filter(i => i.id !== draggedItem);
                              const newExternalSlots = c.externalSlots.map((s, idx) =>
                                idx === slotIndex ? { ...s, occupied: draggedInternalItem } : s
                              );
                              const newInternalWeight = newInternalGrid.reduce((sum, i) => sum + (i.currentWeight || i.weight), 0);
                              const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                              return {
                                ...c,
                                internalGrid: newInternalGrid,
                                externalSlots: newExternalSlots,
                                currentWeight: c.emptyWeight + newInternalWeight + newExternalWeight
                              };
                            }));
                          }
                        } else {
                          // Couldn't identify slot — snap back
                          setPlacedItems(prev => prev.map(c => {
                            if (c.id !== openContainerId) return c;
                            return {
                              ...c,
                              internalGrid: c.internalGrid.map(i =>
                                i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                              )
                            };
                          }));
                        }
                        itemWasHandled = true;
                      } else if (isItemOverInternal) {
                        // Item body fits within internal grid — commit the new position
                        const { row: newRow, col: newCol, isOutOfBounds } = resolveDropPosition(
                          clientX, clientY, dragOffset, internalRect, subCellSize, bounds,
                          Math.ceil(container.internalCapacity / 5) * SUB_DIVISIONS,
                          5 * SUB_DIVISIONS
                        );
                        setPlacedItems(prev => prev.map(c => {
                          if (c.id !== openContainerId) return c;
                          return {
                            ...c,
                            internalGrid: c.internalGrid.map(i =>
                              i.id === draggedItem
                                ? { ...i, position: isOutOfBounds ? dragStartPosition : { row: newRow, col: newCol } }
                                : i
                            )
                          };
                        }));
                        itemWasHandled = true;
                      } else if (!isItemOverInternal && isOverMainGrid) {
                        // Move to main grid — lowest priority, only when not over overlay targets
                        const { row: newRow, col: newCol } = clampPosition(
                          Math.round((clientY - mainGridRect.top) / subCellSize),
                          Math.round((clientX - mainGridRect.left) / subCellSize),
                          bounds, GRID_SUB_ROWS, GRID_SUB_COLS
                        );
                        setPlacedItems(prev => prev.map(c => c.id === openContainerId ? {
                          ...c,
                          internalGrid: c.internalGrid.filter(i => i.id !== draggedItem),
                          currentWeight: c.emptyWeight + calculateInternalWeight(c) - draggedInternalItem.weight + calculateExternalWeight(c)
                        } : c).concat([{ ...draggedInternalItem, position: { row: newRow, col: newCol } }])
                        );
                        itemWasHandled = true;
                      } else {
                        // Dropped outside all valid targets — snap back
                        setPlacedItems(prev => prev.map(c => {
                          if (c.id !== openContainerId) return c;
                          return {
                            ...c,
                            internalGrid: c.internalGrid.map(i =>
                              i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                            )
                          };
                        }));
                        itemWasHandled = true;
                      }
                    }
                  } else {
                    // Dragging FROM main grid to overlay targets.
                    // Attachment slots take priority — check cursor position against slot refs first.
                    const container = placedItems.find(c => c.id === openContainerId);
                    const slotIndex = container?.externalSlots ? attachmentSlotRefs.current.findIndex(el => {
                      if (!el) return false;
                      const r = el.getBoundingClientRect();
                      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
                    }) : -1;

                    if (slotIndex !== -1 && container) {
                      // Cursor is over a slot — attach or snap back
                      const targetSlot = container.externalSlots[slotIndex];
                      if (targetSlot.occupied) {
                        setPlacedItems(prev => prev.map(i =>
                          i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                        ));
                        itemWasHandled = true;
                      } else if ((item.currentWeight || item.weight) > targetSlot.maxWeight) {
                        alert(`Item too heavy for this slot (max ${targetSlot.maxWeight} lbs)`);
                        setPlacedItems(prev => prev.map(i =>
                          i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                        ));
                        itemWasHandled = true;
                      } else {
                        setPlacedItems(prev => {
                          const newExternalSlots = container.externalSlots.map((s, idx) =>
                            idx === slotIndex ? { ...s, occupied: item } : s
                          );
                          const newExternalWeight = newExternalSlots.reduce((sum, s) => sum + (s.occupied ? (s.occupied.currentWeight || s.occupied.weight) : 0), 0);
                          return prev
                            .filter(p => p.id !== draggedItem)
                            .map(c => c.id === openContainerId ? {
                              ...c,
                              externalSlots: newExternalSlots,
                              currentWeight: c.emptyWeight + calculateInternalWeight(c) + newExternalWeight
                            } : c);
                        });
                        itemWasHandled = true;
                      }
                    } else {
                      // Not over a slot — check if item body lands in internal grid
                      const shape = getScaledContainerShape(item);
                      const bounds = getShapeBounds(shape);
                      const anchorCol = Math.round((clientX - internalRect.left - dragOffset.x) / subCellSize);
                      const anchorRow = Math.round((clientY - internalRect.top - dragOffset.y) / subCellSize);
                      const itemLeft   = internalRect.left + (anchorCol + bounds.minCol) * subCellSize;
                      const itemRight  = internalRect.left + (anchorCol + bounds.maxCol + 1) * subCellSize;
                      const itemTop    = internalRect.top  + (anchorRow + bounds.minRow) * subCellSize;
                      const itemBottom = internalRect.top  + (anchorRow + bounds.maxRow + 1) * subCellSize;
                      const isItemOverInternal = itemLeft >= internalRect.left && itemRight <= internalRect.right &&
                                                 itemTop >= internalRect.top && itemBottom <= internalRect.bottom;
                      if (isItemOverInternal && container) {
                        if (item.id === openContainerId) {
                          alert('Cannot place a container inside itself!');
                          setPlacedItems(prev => prev.map(i =>
                            i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                          ));
                          itemWasHandled = true;
                        } else {
                          const internalWeight = calculateInternalWeight(container);
                          if (internalWeight + item.weight > container.internalCapacity) {
                            alert('Exceeds internal capacity!');
                            setPlacedItems(prev => prev.map(i =>
                              i.id === draggedItem ? { ...i, position: dragStartPosition } : i
                            ));
                            itemWasHandled = true;
                          } else {
                            const { subRows: internalSubRows, subCols: internalSubCols } = getInternalDimensions(container);
                            const { row: newRow, col: newCol } = clampPosition(
                              anchorRow, anchorCol, bounds, internalSubRows, internalSubCols
                            );
                            setPlacedItems(prev => prev
                              .filter(p => p.id !== draggedItem)
                              .map(c => c.id === openContainerId ? {
                                ...c,
                                internalGrid: [...c.internalGrid, { ...item, position: { row: newRow, col: newCol } }],
